灰各等分酒調下又雄羊糞每粒改作三丸面為衣曬乾每服四十九丸煮酒下盡醉綿被蓋睡外治方萱花根搗爛塗或蒲公英搗爛塗俱效臍腹部人心下有膈膜前齊鳩尾後齊脊骨十一椎周圍著脊所以遮膈濁氣不使上薰心肺其名曰膈十二經之脈惟膀胱不貫膈余皆能令膈疼膈下為胃上口在臍上五寸上脘穴分即上焦也臍上四寸為中脘即中焦也肺脈起中焦在此臍上二寸為下脘即胃下口屬下焦膈下為胃上口曰賁門在臍上五寸臍上二寸為胃下口曰幽門傳入小腸心脾筋結臍胃之筋挾臍肝脈抵小腹開鬱道氣湯治一切腹痛蒼朮一錢香附一錢川芎一錢白芷一錢茯苓一錢滑石一錢梔子一錢神麯一錢炒陳皮五分炮薑五分甘草三分水煎服神驗丹治胃脘痛乳香沒藥木香硃砂各等分共為細末每服二錢薑湯調服鐵門閂治胃氣疼如神元胡莪朮良薑五靈脂當歸各等分每服或一錢或二錢至多以三錢為度用好陳醋溫熱一杯調服遊山散治胃氣痛仙方詩云草果元胡索靈脂並沒藥酒調服三錢一似手拈卻上四味等分為末每服三錢溫酒調下不拘時服治胃疼方淡豆豉五錢煎湯半茶鍾服之立愈治胃脘大痛方大梔子或七九個炒焦用水二鍾煎八分加生薑汁二三分服之立愈治胃氣冷痛方白砂糖五錢生薑一片熬水熱服治冷氣搶心一發即死及久患心腹痛方蓬莪朮二兩醋炒木香一兩煨共為末每服五分醋湯調下從發時服至好後兩三日一日服三四次大小男女一切心氣疼馬兜鈴一個燈心燒存性為末溫酒調服立效胃脘血氣疼紅花一大撮水二鍾煎一鍾服心如刀刺口吐清水有蟲生艾杵汁一大碗先半日勿吃晚飯次日五鼓先細嚼燒肉於口內切勿吞下口中水入肚蟲聞香則頭向上矣良久飲艾汁立時打下蟲出神效散治心疼作酸及水停心下作聲如雷口眼歪斜不省人事膽礬一分為末溫黃酒送下以吐盡痰為度治蟲鬧心痛牙關緊閉勢將欲死老蔥白五莖去皮及須搗取汁灌入喉中如牙緊難開用烏梅泡水擦之自開隨灌麻油四兩但得下咽即蘇少頃蟲積皆化成黃水而下治中惡心腹痛宰白毛烏骨雞覆心口上即瘥即死亦以此法治之要骨俱黑者良如鬼擊用血塗之或滴口中俱妙治心疼方真芝麻油一鍾煎熬極滾入燒酒一小杯乘熱飲治心疼方牙關緊閉欲死是因蟲之所致者用老蔥白五莖去皮及須搗爛取汁用匙送入咽喉下隨灌真香油四兩但得下咽即蘇少頃蟲積皆化黃水而下極效治腹緊急疼痛不辨何症男婦並治用食鹽炒熱以布裹尉之其效如神治卒然肚現青黑色不拘大人小兒此乃血氣失養風寒乘之所變怪形真危惡之敗症也急用大青葉烘燥研細每服一錢五分以好酒調下黑退即愈此起死回生之方也治絞腸痧方此症夏日最多肚腹急疼唇指青黑者是感受痧氣然要看四肢彎彎處有青筋現露急用針刺出惡血立刻疼減或用青銅錢沾涼水香油各半將前後心胸腹腰背筋骨縫處及四肢彎彎處俱細細刮出痧子形來疼痛即解大半再用透明白礬研末每服二錢用生冷水熟熱水各半杯兌勻調服即愈切忌薑湯茶葉大葷小米及一切熱飲熱食與諸生物總之病愈後要將肚腹多空幾個時辰才好直待甚覺餓時方食放冷稀粥且此症務要辨明倘是陰症小腹疼者萬不可用此法治治陰症小腹疼方預用生黃豆令病人嚼之不知豆味且細將本人問明夜間有無房事房事後或食生冷或受外寒否枯白礬棗子大一塊帶須蔥白切一寸長三個胡椒按病人歲數一歲一粒用男孩吃之乳量兌共合一處搗做成一大丸放肚臍上一炷香時疼痛即止忌生冷要緊又治陰症神方白明礬一分胡椒二分芒硝一分共為細末用鹽醋調和攤男左女右手心緊合陰處蓋暖出汗即愈其效如神又治陰症方名回春散歌曰一錢白礬八分丹即黃丹二分胡椒細細研芒硝一分共四味陳醋和來手內攤男左女右合陰處渾身出汗透衣衫陰症此方如神效不遇真人不與傳病甚重者宜加料治之又治男婦房事後中寒肚疼方用生薑蔥白同搗爛熱酒沖服強睡片時汗出即愈如疾甚者再另用蔥白頭搗爛炒熟攤臍上以艾火灸之鼻尖出汗即愈純陽救苦湯治男婦陰症神效大黑豆三合炒熟生薑大塊約重二三兩切片用水三碗煮片時去薑豆取湯服汗出即愈華他救苦方治寒中三陰口噤失音四肢強直攣急疼痛狀似中風及厥逆唇青囊縮無脈卒倒尸厥脫陽等症急用蔥白一握微搗爛炒熱用布包尉臍下以三包更替尉之甚者再用艾火灸氣海關元二三十壯脈漸出肢漸溫乃可生也又治腹疼方不拘寒熱並效胡椒四十粒緑豆四十粒同研細碎用滾酒浸服疼痛立止又治小腹疼諸藥不效者用婦人油發燒灰三錢酒調服腰胯臀股部肝脈入腰腎脈入腰膀胱脈抵腰膀胱脈貫臀筋結於臀臀下曰股股肉屬脾筋屬肝骨屬腎股之內側曰陰股脾肝腎三經筋脈俱循陰股六合散治腰痛因寒者百試百驗羌活獨活大茴香小茴香杜仲當歸各三錢加破故紙二錢亦好黃酒一碗煎露一宿次早空心溫服立愈又治腰痛因虛者三服立愈杜仲五錢故紙四錢萆薢三錢半當歸二錢半續斷二錢牛膝二錢狗脊二錢木瓜一錢五分炙草五分引用胡桃肉一兩五錢一半同煎一半嚼食下藥酒煎加鹽一捻服戒房事又治腰痛因風者痛牽兩足左右無常處獨活二錢桑寄生二錢杜仲二錢牛膝一錢細辛一錢秦艽一錢茯苓一錢防風一錢川芎一錢當歸八分白芍八分地黃八分甘草八分水酒兌煎沖桂心一錢研細末服治腰痛因氣滯者潞黨一錢五分川芎一錢五分桔梗一錢五分白朮一錢五分白芷一錢五分陳皮一錢五分枳殼一錢烏藥一錢炮薑一錢甘草一錢水煎服治腰痛因閃挫跌傷者大茴香一錢山甲一錢元胡一錢黑醜五分陳皮五分炙草五分木香八分共為細末黃酒調服二錢一日服三次如不效是有滯血服後方治腰痛因跌墜瘀血或大便不通川軍二錢全歸二錢牛膝二錢杏仁二錢赤芍一錢紅花一錢生地一錢羌活一錢川芎一錢五分桂枝三分水酒兌煎服又治閃挫腰痛方神麯用拳頭大一塊火燒通紅淬黃酒一碗內少頃去神麯飲黃酒即愈又六合散治腰痛因寒因虛傴僂不能步履杜仲肉蓯蓉制巴戟洗小茴香補骨脂淨青鹽各一錢共為細末用羊腰子二個以竹刀剖開散藥末在內仍合住外用熟麵包好微火煨熟好酒送下日食一服治胯疼因濕寒者蒼朮一錢白朮一錢炙草一錢茯苓二錢炮薑二錢橘紅二分半丁香二分半白芍四分青皮四分檳榔四分水煎服治胯痛因濕熱者川柏一錢鹽炒澤瀉七分蒼朮一錢杜仲七分白芍七分牛膝七分威靈仙七分木瓜七分陳皮七分甘草二分水煎調乳香沒藥各去淨油研細末各二分補胯丸治久痛屬虛者黃耆五錢獨活五錢牛膝五錢秦艽五錢桑寄生五錢石斛五錢潞黨一錢五分小茴香一錢五分木瓜一錢五分全當歸七錢半蒼朮七錢半杜仲七錢半大熟地一兩肉桂一錢五分共為細末煉蜜合丸梧桐子大每服四五錢用溫黃酒送下治臀癰初起紅赤腫痛重墜大便祕川芎當歸防風赤芍蘇木連翹花粉皂針紅花黃芩枳殼各三錢川軍一錢五分乳香五分去油水煎服臀癰已成托裡排膿方黃耆二錢當歸一錢川芎一錢銀花一錢皂針一錢川甲一錢甘草節一錢水煎入黃酒一杯服兩胯合縫處結腫名魚口便毒方歸尾三錢甘草節三錢川軍三錢川山甲三片殭蠶一錢黑醜一錢木鱉子三個水酒兌煎服俟便利四次後食涼稀粥以補之又方治同上名九龍丹兒茶血竭乳香去油巴豆去皮油木香各等分共為細末用蜂蜜合丸如緑豆大每服九丸熱黃酒送下甚者兩服必消又屢驗奇方治同上金頭蜈蚣一條要全研細同生雞蛋一個從一頭打開指頂大一孔將蜈蚣末入內用銀簪攪勻外用水濕紙厚裹之向火內燒熟晚睡時就熱黃酒食之至次日周身欠爽如重感冒病樣勿恐過一日即愈疙瘩已全化矣治股痛因脾濕者白朮三錢炒防己三錢牛膝三錢浸川附子一錢炮水煎沖肉桂一錢研末沉香五分研末炒鹽一捻服治股痛筋拘攣者是肝腎受寒大熟地山萸山藥丹皮澤瀉茯苓塊附子肉桂川膝車前子水煎沖沉香五分研末炒鹽一捻服治股裡面名陰股痛者柴胡一錢五分白芍五錢當歸五錢洗白朮三錢土炒茯苓三錢丹皮一錢洗炒梔三錢青黛一錢薄荷五分龍膽草五分水煎服

body:
  text: 卷之二耳部腎氣通耳小腸脈膽脈三焦脈俱入耳中三經之邪俱令耳病胃脈上耳前胃筋結耳前膽脈三焦脈俱走耳前三焦筋從耳前屬目小腸筋膀胱筋俱結耳後完骨胃脈之支三焦脈膽脈俱過耳後耳膿常流方大人小兒耳內生瘡膿水常流不幹或傷水濕坐底聤耳成膿時流臭水者俱用麥小粉以醋煎滾打如漿糊晚上搽於耳之前後留出耳上不搽以紙一張裂縫套耳蓋之免汙枕被次早洗去晚上再搽三五次即愈耳內蟲痛方如有蟲在內奔走或血水流出或干疼不可忍以蛇蛻一條熯存性研細末用鵝毛管吹入立愈或滴貓尿或滴鹽滷俱效諸般耳聾方用北細辛一錢研末將黃蠟化為丸如鼠糞大以綿裹塞耳內兩三次即愈戒惱怒耳後出血方凡人耳後髮際搔癢小竅出血用止血藥不效者此名發泉取多年糞桶箍燒灰敷之立愈如指縫出血亦然或用炒甲片細末罨之亦止五竅出血方凡耳口目鼻一齊出血名曰上虛下竭死在須臾不及用藥先將冷水當面噀幾口若婦女急分開頭髮以水噀之若男子無發可分用粗紙數層冷醋浸透搭在囟門其血即止隨服補血湯炙黃耆一兩當歸三錢加沉香童便服血自歸經再加調補照式速救多有生活耳中出血方龍骨屑吹入即止耳中出膿方發灰吹入即止或用陳皮炭一錢輕粉三分麝香五釐研極細末吹入數次即干耳內濕結塊方生豬脂地龍糞釜下墨共研爛和蔥汁捏如棗核綿裹納入耳內潤則換之耳干痛亦用此方效透竅丹治聾龍骨真麝香冰片共研極細末用雄鼠膽汁一枚合作三丸用綿裹塞耳內不可取出一夜即能通音耳忽大痛方如蟲在內或流水或干疼田螺一個撥開蓋入麝香五分自化成水滴入即愈又方治同上每日平明以大指食指捏住鼻孔勿令泄氣咬牙弩目閉口使氣入耳悶極放手有間即此行之久則自效治耳內流膿腫疼方番木鱉一個磨水滴入耳內即愈治耳內出膿水海螵蛸一錢枯礬一錢麝香一分干胭脂五分燒存性共為細末吹入耳內即效治小兒耳內出膿水久疼不止方枯礬一錢煅龍骨一錢黃丹一錢海螵蛸一錢麝香二釐干胭脂七分燒存性共為細末先用綿拭乾膿水再吹此藥螞蟻入耳用精豬肉一塊炙香放耳邊引出或用川山甲炒研細末調水灌之或用韭汁灌之蜈蚣入耳用雞肉炒香放耳邊引出或以薑汁灌之蜒蚰入耳用羊乳滴入耳內即化為水或烙麻油餅貼耳上其蟲亦出或用鹽擦耳內即化水飛蛾入耳用鵝管極氣吸之或擊銅器於耳邊諸蟲入耳一用香油滴入一用藍汁灌入一用蔥汁灌入一用人乳滴入其蟲皆自出用細蘆管入耳吸之蟲隨出用米醋滴入蟲不出必死凡蟲毒入腹作脹飲好酪酒二升即化水毒亦消耳內外生瘡方五倍子炒研細末水調塗之治耳閉方細辛一分石菖蒲一分木通一分麝香一釐共為末用綿裹塞耳中耳聾開竅奇方活鯉魚一尾不拘大小劈取腦髓碗盛飯上蒸出油來用茶匙挑滴耳內數次自然竅開以後服補藥收功補藥方故紙一斤黑芝麻一斤火酒二斤童便一斤上四味同煮乾為度取出曬極干再將上二味共炒香不用芝麻只將故紙為末以老米醋打糊為丸緑豆大每服二三錢用杜仲二錢炒去絲知母二錢水煎湯送下服一半即見效功不可盡述鼻部肺開竅於鼻兩眉頭下為山根山根曰下極下極應心足陽脈交山根山根下為鼻柱相家曰年壽應肝年壽左右應膽鼻柱下為面王相家曰準頭亦曰明堂屬土應脾明堂兩旁為方上在迎香上曰鼻隧相家曰蘭臺廷尉應胃胃脈起鼻兩旁胃筋亦結鼻旁鼻孔大腸脈挾鼻孔小腸脈抵鼻膀胱筋結鼻下兩旁鼻流清涕方川椒訶子肉肉桂生薑乾薑川芎細辛白朮各等分酒煎服鼻流濁涕方用燒酒半壺煎極滾鼻吸熱氣入腦即愈鼻乾無涕方蒼耳子桑白皮元參菊花薄荷川芎絲瓜根各等分水煎服治鼻淵方流濁涕經年纍月不止即腦漏也當分別寒熱治之涕濁味臭者熱也涕清而腥者寒也屬熱者治法熟地八錢山藥四錢山萸四錢丹皮三錢茯苓三錢澤瀉三錢菊花三錢薄荷二錢元參三錢蒼耳子五錢共為細末煉蜜合丸梧桐子大每服三錢白開水送下屬寒者治法熟地八錢山藥四錢山萸四錢丹皮三錢茯苓三錢川附子一錢肉桂二錢澤瀉三錢川芎三錢升麻三錢蒼耳子五錢共為細末煉蜜合九梧桐子大每服三錢白開水送下治鼻流黃臭水方俗名控腦砂腦中有蟲也用絲瓜藤近根三五寸燒存性研末酒調服二錢立愈外用桃葉曬乾作枕又治鼻淵方陳香櫞木香扁柏砂仁川芎各等分水煎服治腦漏鼻涕臭方百草霜研細空心冷水調服一錢三五服即愈治鼻漏方鼻孔中長出一塊辛夷四兩去毛梔子二兩枳實二兩桔梗二兩白芷二兩共為細末每服二錢蘿蔔湯送下鼻中肉墜用藕節有毛處一節燒存性為末吹患處鼻內生肉氣閉辛夷白芷升麻藁本防風川芎細辛木通甘草各一錢五分共為細末每服三錢茶調下外用白礬燒灰加硇砂少許研末吹鼻中鼻中氣臭赤芍八分黃芩八分藁本八分生地八分黃連八分石菖蒲八分遠志八分甘草三分水浸清水煎服瘜肉痔癰鼻生瘜肉氣息不通香臭莫辨痔癰亦然皆胃家濕熱黛蒸所致宜清氣化熱疏邪利竅內服茯苓桔梗山梔黃芩辛夷白芷木通升麻柴胡防風蒼朮薄荷各等分每服用七八錢清水煎服治瘜肉外方瓜蒂三錢細辛二錢麝香一分為末每用一捻以綿裹塞鼻內即化黃水桃葉嫩心亦可塞之治痔癰外方雄黃白礬苦丁香各等分為末用霜梅肉搗膏作成條入鼻內化水即愈齆鼻不聞香臭將鐵鎖磨石上取末豬脂調綿裹塞鼻肉出愈又方乾薑為末蜜調塞鼻亦效因外感鼻塞兼咳嗽嚏者羌活一錢前胡一錢紫蘇一錢桔梗一錢旋覆花一錢陳皮一錢枳殼一錢升麻五分葛根一錢甘草五分水煎服無外感鼻塞辛夷川芎木通細辛羌活藁本升麻白芷炙草各等分蒼耳減半水煎服鼻內生瘡犀角五分羚角一錢五分天冬一錢五分川貝母一錢五分麥冬三錢知母二錢黃芩二錢胡連一錢五分甘草一錢水煎調牛黃研末一分服外治用杏仁去皮尖研爛和乳汁不時用箸頭擦之或用黃連一錢麝香五釐為細末擦之鼻血不止茅花一錢辛夷五分當歸三錢生地三錢白芍二錢木通六分芥穗一錢酒炒黑存性水煎服服後即臥立止外用白芨一兩研細末用陳醋調塗囟門下至兩眉心上寬下窄如胡蘿蔔形再用山梔仁白芷等分為末吹於鼻內用此三法調治無不愈者又方黃芩二兩白芨二兩為末水丸服神效頸項部頸前為十二經道路項乃腎與膀胱所主利氣飲治閃挫或久坐或失枕以致項痛乾薑一分乾葛五分升麻五分蒼朮五分桔梗五分川軍二分枳殼一分芍藥四分陳皮七分甘草七分半夏三分白芷三分茯苓三分當歸三分生薑三片水煎溫服木瓜煎治項筋急不得轉側木瓜一個切兩半去瓤沒藥一兩研乳香一錢二分半研將乳沒二味共納入木瓜中再將兩半合系扎定在飯上蒸三四次研成膏每服三五茶匙用地黃四五錢黃酒煎湯送下普濟消毒飲治疫邪傳染項面腫衆人一般者黃芩三錢黃連一錢五分陳皮一錢五分元參一錢五分甘草一錢五分柴胡一錢五分桔梗一錢五分連翹五分淨蒡子五分炒研升麻五分殭蠶五分炒大黃或一錢或五分酒炒水煎服防風解毒湯治頸項結核浮腫先寒後熱是風寒所搏也防風一錢荊芥一錢桔梗一錢蒡子一錢連翹一錢甘草一錢石膏二錢煅薄荷一錢枳殼一錢川芎一錢蒼朮一錢知母一錢燈心三十寸水煎服連翹消毒飲治結核堅腫色紅微熱者是熱毒所致也連翹陳皮桔梗元參黃芩赤芍當歸梔子葛根射干花粉紅花各一錢甘草五分若大便祕者加大黃水煎服加味藿香飲治頸項腫痛寒熱頭眩者氣毒也藿香甘草桔梗青皮柴胡半夏紫蘇白朮陳皮茯苓白芷厚朴川芎香附夏枯草各等分為粗末每服四五錢水煎服滋榮散堅湯治結核纍纍先小後大初不疼是瘰癧也川芎當歸白芍熟地陳皮茯苓桔梗白朮香附各一錢甘草海粉各五分貝母人參昆布各三分升麻紅花各二分水煎服又方治同上夏枯草一斤水煎成膏每服四五錢用黨參黃耆白朮當歸棗仁各一錢五分遠志廣皮各一錢甘草木香各五分引加圓肉五枚淡竹葉五分燈心三十寸水煎調服通治瘰癧方治瘰癧不分新久表裡虛實及諸痰結核陳皮白朮柴胡桔梗川芎當歸白芍連翹茯苓香附醋炒夏枯草黃芩各一錢藿香半夏白芷甘草各五分薑三片水煎兌黃酒一小杯服芎歸養榮湯治瘰癧流注及一切不足之症不作膿或已潰不斂或身體發熱惡寒肌肉消瘦飲食少思睡臥不寧盜汗自汗驚悸恍惚並皆治之人參一錢歸身二錢黃耆白朮川芎白芍熟地各一錢五味子麥冬遠志甘草茯苓各五分丹皮砂仁各三分薑三片棗二枚水煎空心服大紅膏治瘰癧痰核結塊不分新久但未破者並效南星銀硃血竭硝石潮腦輕粉乳香貓頭骨一具煅石灰一兩用大黃片二錢同炒俟石灰色紅去大黃上共為細末陳米醋熬稠調藥敷核上三日一換看皮嫩微損者另換紫霞膏貼之其核自消紫霞膏治瘰癧初起未成者貼之自消已成未潰者貼之自潰已潰核存者貼之自脫及治諸色頑瘡濕痰濕氣新久棒瘡疼痛不已並效明淨松香淨末一斤銅緑淨末二兩用香油四兩銅鍋內先熬至滴水不散方下松香熬化次下銅緑熬至白煙將盡其膏已成候片時傾入罐內凡用時放湯內頓化旋攤旋貼治痰核癧𤶱單方羊角一斤鍘碎新瓦炙黃研末每早酒調服三錢吃完即愈治已破瘰癧方用砒如米粒大入破口內以紙封之神效治頸上癭瘤方不痛不癢俱是痰結川黃柏細末一兩海藻細末一兩二味合勻收貯每用五分放手心上以舌舔之一日三五次即消痰核用鯽魚同山藥搗爛塗之治瘰癧祕方此方甚奇世祕不傳既擅神效何妨共知但大人瘰癧方可用此自以合媾之精當即接塗之神效潰爛者甚妙只可行一二次此方出自續回生集肩手部肩下曰膊膊下對腋處曰臑臑盡處為肘肘當臂腕肘以下為臂臂掌交接處為腕腕以上大指節後如肥魚隆起統謂之魚大指屬肺肺脈自腋入臑至大指出其端食指屬大腸大腸筋脈皆起於食指中指屬包絡包絡之脈自腋循臑入肘臂至中指出其端無名指屬三焦三焦筋脈俱起無名指外廉小指內側屬心外側屬小腸肩大小腸三焦筋脈俱至肩肺筋結前髃膽脈至肩上膀胱筋結肩髃治肩前面痛方大腸經地位也風熱乘肺肺氣鬱其腑先病所以肩前疼痛宜通肺氣散風熱防風二錢川羌二錢升麻一錢五分柴胡一錢五分桑皮三錢貝母三錢白蔻一錢去皮陳皮一錢五分水煎服若面白氣短加參耆治肩後面痛方小腸經地位也因感風熱氣不行耳防風二錢川羌二錢藁本一錢五分蔓荊子一錢五分木通一錢五分水煎服若心血虛加大劑四物湯治肩背連臂痠痛方甚則兩手軟痹由痰飲流入四肢也陳皮二錢半夏二錢茯苓二錢南星一錢五分木香一錢薑黃一錢甘草五分生薑三片水煎服若因腎水虧筋骨失養以致痹宜服大劑六味地黃湯治臂痛方赤芍一錢五分當歸三錢黃耆二錢川羌二錢防風二錢薑黃一錢五分甘草一錢生薑三片水煎服治臂痛不能舉方或痛無定處由脾虛邪氣相搏耳脈必沉細黨參一錢五分炙耆一錢五分白朮一錢當歸一錢陳皮八分升麻五分柴胡七分桂枝六分薑黃一錢威靈仙六分甘草五分生薑三片大棗三枚水煎服又方治氣血凝滯臂痛不能舉者薑黃二錢赤芍一錢五分當歸一錢五分海桐皮一錢五分白朮一錢
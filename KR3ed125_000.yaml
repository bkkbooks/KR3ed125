front:
  text: 序昔宋廣平為郡守號曰有腳陽春論者謂愛民恤物所至皆春公卿大夫之能事下此者難之余曰不然天以好生為德人以好生為心施之無具上之人無以推恩行之有方下之人可以廣惠我澤如春待人而行不擇人而行也潞河玉堂謝公樂善人也每歲刷印善書百餘卷敬謹施送時人多稱道之而公既欲正人之性情尤思救人之疾苦乙巳春手持回生集與經驗集各數冊囑余擇其精粹者勒為一編欲付梓人以傳施於世余應之竊欣然喜曰是誠物我同春而欲隨地施行者也夫千萬易得一效難求金匱石室美不勝收然非用之而效屢用屢效者施之亦復奚裨余自入學後嗜岐黃術凡有得心應手之方必秘錄之或系家傳或博採群書或旁搜於名族大家所珍藏劑之大小不一分兩之輕重不等要在每試必驗其妙無窮蓋三十年於茲矣集方若干未敢出以告人承謝公之囑而思助其樂善好施之心爰於舊篋中檢出因人身之部位匯而輯之其有不足者即益以回生經驗之良方共為一卷以便施送名曰春腳集非敢謂著手成春謂玉堂春滿得此以導之庶幾不脛而走爾是為序道光二十六年丙午菊月泃陽孟文瑞荇洲氏書於京都澤春堂
  hash: sha256:6979e54754ed8869975419d9bea176ac039e389d64c841a28f7a7e76532d7add

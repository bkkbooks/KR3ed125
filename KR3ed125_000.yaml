body:
  text: 凡例是書只為救難濟急非為學醫而設亦非為行醫而設往往窮鄉僻壤無從延醫以致臨症束手殊堪扼腕投以集中之方真有捷於影響之效此謝公施送之意即鄙意亦只為此起見至欲洞達夫陰陽造化之精熟悉夫生人性命之蘊懸壺以應世則無須乎此是書因施送而成擷精揭要務期簡該不至重大而可以行遠可以濟世故良方雖夥未便廣收識者諒之因症分類固名家著作體例此則因人身部位彙輯取其便於查閱且簡而能該庶免掛一漏萬之識周身部位後隨錄諸方以補前缺其方更簡其用更妙分內外婦幼四科亦使各有統屬無相朦混每部位下約略註明數語皆節錄前人集輯非敢臆撰惟專為不知醫者言之故一歸簡明集中所錄皆歷代大家成方恐卷帙浩繁故姓氏概不錄敘非敢沒前人之長集中諸方余已屢試屢驗認清部位自然投無不利然毫釐千里不可不慎臨時認症是所望於司命者集中丸散膏丹其效如神然必須平日按方炮製蓄以待用乃可收效於臨時而限於資財者又恐力不從心倘仁人君子製成施送其功更無涯涘矣

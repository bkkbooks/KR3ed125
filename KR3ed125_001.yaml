body:
  text: 卷之一頭部頭為諸陽之首位高氣清必用輕清之劑隨其性而達之始見功效立愈湯治一切頭痛不拘正痛或左或右偏痛皆效何首烏三錢土茯苓一兩天麻二錢當歸二錢防風二錢水煎服連服三劑或四劑治半邊頭痛此症得之鬱氣不宣又加風邪襲之不拘左右皆效白芍五錢川芎一兩郁李仁一錢柴胡一錢白芥子三錢香附二錢白芷五分生甘草一錢水煎服治頭痛如破流走無定處方此症多因飲酒之後感受邪風之所致也川芎一兩細辛一錢白芷一錢水煎服治頭風不拘偏正立刻止疼方琉黃一錢真川椒取紅色者去淨黑子為末三分上二味拌勻溶成小餅左痛塞左鼻清涕從右鼻出右痛塞右鼻清涕從左鼻出正病左右俱塞待清涕流盡即愈清空膏治諸般頭疼惟血虛疼者不治血虛痛者服知柏地黃湯或服頭痛奇方其方在後生甘草一兩五錢蜜炙用黃芩三兩酒炒防風一兩黃連一兩酒炒羌活一兩柴胡七錢川芎五錢上共為細末每服二錢入茶汁少許調成膏臨睡時用白開水送下頭痛奇方全當歸用整的川芎各五錢水煎服治一切頭風嗅鼻立愈方兼熱者用蓽茇不拘多少川豬膽汁拌勻候乾研細末每用少許嗅鼻中作嚏立愈兼寒者用瓜蒂松蘿茶葉各等分為末嗅鼻出黃水立愈偏頭疼方正疼亦效新鮮蘿蔔搗取自然汁加入冰片少許調勻昂頭灌鼻孔左痛灌左右痛灌右少時即愈如無蘿蔔時將蘿蔔子用涼水泡取汁治真頭痛方其症頭痛連腦目睛紅赤暴疼如破不得良方便痛死者速煎此湯服即愈辛夷三錢川芎一兩蔓荊子二錢細辛一錢當歸一兩水煎服治頭痛致耳邊發太陽痄腮俱疼難忍生川軍末用蔥汁調敷四圍中露一頂不日即愈頭風畏冷方用陳蒿麥面二升水調作二餅烙熱貼於頭痛處上用新綿蓋好冷時再換一餅俟頭上微有汗出則風毒盡收入餅中不過兩次即愈治腦漏豬肺一個水洗淨放鍋內水煮加入開口花椒照人年紀每歲三顆煮熟食之過七日食一個連食三個即愈又方蒼耳子辛夷花各三錢水煎服三劑即愈鼻流臭氣方每日早晚各溫飲數杯蘄艾八兩黃酒五斤煎服兩三料自愈目部目為五臟之精華一身之至要蓋應乎五臟而主乎肝者也兩眥屬心烏睛屬肝白睛屬肺眼胞上下屬脾黑睛中間瞳人屬腎治暴發火眼宜南方名金液湯言其和平中又有精妙處如至寶之汁漿也前胡一錢柴胡一錢防風一錢赤芍一錢蔓荊子七分薄荷六分獨活三分芥穗五分黃芩五分白桔梗八分知母五分水煎服治暴發火眼宜北方北平之人日受風沙夜臥熱坑二氣交爭況又地土寒冷多食燒炙蔥韭蒜薑椒等物以致內外交攻併入於目所以胞腫珠痛多眵多淚痛澀難開白睛紅赤或起粟瘡黑睛昏暗或起膜翳種種風火交集之症皆宜此方治之當歸二錢小生地三錢川芎三錢赤芍一錢五分黃芩一錢五分黃連一錢五分防風二錢白蒺藜三錢炒連翹三錢淨羌活一錢五分石膏四錢煅川軍三錢芒硝五錢水煎服開瘴去翳散真有翳瘴方可點之黃連黃芩川軍連翹小生地膽草菊花銀花薄荷木賊川羌活蟬蛻赤芍防風荊芥甘草黃柏上十七味各一錢水煎濃湯去淨渣土澄清放碗中揀上好羊腦蘆甘石一兩煅紅淬入藥湯內連煅淬三次即將甘石浸在藥湯內再將碗口用紙封好勿令落塵俟過數日後極干時再加入銅緑二分膽礬二分硃砂三分水飛雄黃三分水飛硼砂五分冰片八分麝香三分共研極細如塵收磁瓶內封固口用涼水骨簪點少許靈飛散消腫止淚明目去翳退赤解痛收濕除爛揀上好真羊腦蘆甘石火煅紅用童便淬如此七次再用水飛淨曬乾聽用每用一兩好硃砂水飛琥珀珍珠真牛黃真熊膽上五味各用一錢另研成膩粉靈藥二錢共和研極細磁瓶收固每有骨簪挑少許點眼內閉目片時再點一次又閉目待藥性過然後用簪撥去藥滓溫水洗淨每日點二三次久閉為妙方內靈藥製法附後水銀五分黑鉛五分火硝八錢硼砂二錢先將鉛化開入水銀作一家再加硝硼研勻入陽城罐內鹽泥封固打火三炷香時先文後武待冷取出聽用玉龍丹治一切火眼赤腫明礬六分沒藥二錢乳香二錢半蘆甘石一兩煅飛過黃丹一兩飛淨珍珠一錢麝香七分梅花片三分共研細末煉蜜為丸一錢重銀珠五分為衣收貯聽用如用時以井花涼水磨塗眼皮外立效散血膏治赤腫不能開睛痛熱淚如雨紫荊皮白芷川柏川軍赤小豆南星寒水石薑黃各等分為細末用水泡小生地搗取汁合成膏敷眼四圍清涼膏南星生用蘇薄荷各五錢荊芥百藥煎各一錢共為末井水調成膏貼眼角上自然清涼搜風散治風熱眼及腫痛川黃連川軍朴硝黃丹各等分為末用苦參煎湯量兌白蜜煉過同調敷眼四弦甚妙洗爛弦風赤紅眼方其效如神苦參四錢五倍子三錢芥穗三錢防風三錢黃連三錢銅緑五分共為細末用蘇薄荷煎湯丸如彈子臨用時以開水浸化洗眼每日洗三次立應散治內外障翳昏澀及暴赤眼一切目疾皆效每日嗅鼻躑躅花一錢白芷二錢當歸二錢雄黃二錢川附子片二錢鵝兒不食草二錢共為細末入麝香少許和勻含水嗅鼻內多流濁涕眼淚為妙碧玉散治眼睛腫脹紅赤昏暗羞明癮澀難開疼痛風癢頭腫鼻塞腦鼻痠痛翳膜胬肉眵淚稠黏拳毛倒睫一切眼症羌活躑躅花薄荷川芎防風蔓荊子細辛陳荊芥白芷風化硝石膏青黛黃連各三錢鵝兒不食草三兩共為細末每用少許吹鼻中一日吹三次青火金針治火眼赤腫及頭痛牙痛者火硝一兩青黛蘇薄荷淨葉川芎各五錢上為細末含水半口令他人以管吹入鼻內取濁涕熱淚流淨為愈赤火金針治赤眼頭風冷淚鼻塞耳鳴牙痛者火硝一兩川芎雄黃乳香沒藥石膏各一錢上為細末每用一分許如前方吹法一日三次通頂散治風毒攻眼並夾腦風白芷細辛藿香葉川芎各七錢躑躅花三錢上為細末每令病者先含新汲涼水一口再令他人用筒挑少許吹鼻內以手擦兩太陽穴止痛乳香丸治眼痛頭痛瘀血攻衝遍身疼痛五靈脂二錢乳香沒藥草烏夏蠶砂各五錢木鱉子五枚上為細末用老酒煮麵糊為丸如梧桐子大每服七丸薄荷湯或茶清任下如頭痛甚三服即止目珠夜疼方治晝不覺痛夜間痛甚者夏枯草二兩炒香附二兩醋炒生甘草四錢炒共為細末每服一錢五分清茶調下下咽即止治雀盲眼效方石決明煅為細末用三錢或豬肝一個或雞肝羊肝皆可用竹刀剖破將決明入內再用麵包燒熟任意食之白開水送下治兩眼夜不見物羯羊肝一副不見水不見鐵以竹刀切開加穀精草細末入瓦罐內煮熟不時服之屢驗塵芒入目以生藕搗取汁將綿裹蘸滴入目中即出飛絲入目白菜搗取汁用帕包滴汁二三點入目即出火藥花炮沖眼目瞎其人倒地急令人解熱小便澆之徐用自己小便洗眼即明治小兒青盲眼木賊草白蒺藜各等分為末炒豬肝食治疳盲眼瞎小兒最多此症大人間亦有之川連五錢酒炒胡連三錢炒阿魏三錢蘆薈二錢五分陳六合神面五錢炒如脾胃弱者加土炒白朮三錢用雄雞肝十個將前藥各為末同蒸熟共搗勻丸如萊蔔子大每服三五分白開水送下日三服又治疳疾眼症並治痘後斑疹餘毒攻目奇效穀精草石決明牡蠣蛤粉夜明砂木鱉子去油各等分為末每用一錢取豬肝一塊竹刀剖開入藥在內麻扎煨熟連汁與食不過十付不止眼好疳亦全愈是方亦可治大人青盲又治痘後斑疹餘毒攻目方決明子一錢五分赤芍一錢五分甘草一錢為末蜜湯調下又方治同上蜜蒙花一錢五分青葙子一錢決明子五分車前子五分共為末取羊肝剖開摻藥在內濕紙包好灰火煨熟空心食之咽喉門咽者咽也所以咽物者也喉者候也所以候氣者也咽則接三脘以通胃喉有九節通五臟以系肺雖曰並行各有主司以別其戶也蓋咽喉之症皆起於肺胃兩經積熱致令津液稠黏痰涎壅盛阻滯上竅清氣不得升濁氣不得降於是內醞火邪外感風邪而諸症作焉紫正散合地黃散治咽喉諸症凡喉中有症即將此方日服一劑自始至末勿離此湯真能使險者化順凶者轉吉荊芥穗八分北防風八分北細辛四分去茆京赤芍八分牡丹皮八分紫荊皮二錢小生地二錢蘇薄荷六分牙桔梗八分生甘草六分淨茜草一錢引加紅內消一錢即茜草藤五月五日採取陰乾燈心二十寸用開水泡藥蒸服孕婦去丹皮加四物湯熱盛者加連翹犀角頭疼閉塞加開關散煩渴加銀鎖匙潮熱加柴胡黃芩咳嗽加麥冬知母大便祕結小便赤澀加木通數日不大便加元明粉熱壅肺閉致氣喘促加麻黃五分先滾去沫再入藥內同蒸痰稠加貝母陰虛加四物湯開關散能清諸風止頭目痛川撫芎一錢杭白芍八分銀鎖匙能止煩渴退口燥天花粉八分元參一錢四物湯生地三錢當歸二錢川芎八分白芍八分酒炒辛烏散又名角藥赤芍梢一兩草烏一兩桔梗五錢芥穗五錢甘草五錢紫荊皮一兩柴胡三錢連翹五錢細辛五錢皂角五錢赤小豆六錢小生地五錢上諸味不宜見火置日中曬燥共為細末收入磁瓶勿令走氣臨用以冷水調噙口內取風痰如神若痰涎盛極加摩風膏濃汁四五滴其力更速凡頸項及口外紅腫即以此角藥敷之亦可用此角藥作洗藥另加入荊芥同煎湯頻頻洗之洗後仍調此角藥敷上摩風膏川烏尖即大附子之尖每用一個以乳鉢底濃磨汁入角藥燈心灰五分回生丹即冰硼散治一切喉症有奇功大梅片六釐麝香四釐硼砂一錢提牙硝用蘿蔔煮再濾入清水內露一夜沉結成馬牙者佳共研極細以潔淨為妙收磁瓶封固用挑少許吹患處開關後次日並體虛頭暈者去麝香名品雪丹毒腫漸平並用刀破後者再去牙硝麝香名呂雪丹加青黛名青雪丹真功丹凡孕婦患喉症者宜用此丹大冰片一分真熊膽一錢陰乾臨用時乳細末蘆甘石一錢用羌活煎湯煅七次飛去腳曬乾用硼砂一錢牙硝二分共為極細末吹患處毒腫漸平去硝刀破後須用呂雪丹消蘆散此方因患者畏刀針以此熏破然見效雖易收功則遲茜草一兩蘆根二兩去皮金毛狗脊五錢唐蜜根一兩即紫荊皮根上用米醋同藥貯小罐內以厚紙封口極固放水中煮好將口上開一小孔如箸頭大對腫處熏之若一時未破加巴豆七粒去殼同煮再熏即破若破後不能速於收功吹生肌散萬益丹凡誤用刀針致血流不止吹此丹即止滴乳香沒藥各一兩去淨油真血竭一兩硼硝一兩研極細用少許吹入刀針患處生肌散乳香一兩去油沒藥三錢去油輕粉二錢五分赤石子一兩水飛數次硼砂二錢五分兒茶二錢五分冰片三分龍骨一兩火煅醋淬水飛研極細末每於患處略用少許鎮驚丸一名四神丸凡喉症已平兼服此丸山藥四兩桔梗二兩山梔炭二兩甘草一兩上氣者加陳皮一兩共為細末米糊為丸如蓮子大硃砂為衣每服一丸用薄荷燈心湯化下紫雪散治一切咽喉腫痛及重舌重齶舌疔等症犀角尖一兩石膏一兩升麻八錢元參一兩甘草八錢沉香五錢銼末寒水石一兩羚角一兩木香五錢用水五碗煎至一碗用絹濾去渣再將湯煎滾投入提淨朴硝三兩六錢文火漫煎俟水氣將盡欲凝結之時傾入潔淨碗內加下硃砂三錢冰片一錢金箔一百張各預研細和勻將藥碗安入水盆中候冷凝如雪俟干再研細收固凡大人每用一錢小兒二三分徐徐咽之再用燈心湯化服咽喉腫痛甚吹之蠟礬丸治喉風穿腮出膿者黃蠟一兩枯礬五錢乳香一錢五分去油沒藥一錢五分去油後三味為末用蠟化開為丸每服二錢開水送下消瘤碧玉散治喉瘤鬱熱之症硼砂三錢冰片三分膽礬四分共為細末用時以箸頭蘸藥點患處自效捷妙丹治雙單蛾風神方牙皂角一兩切碎絲瓜子一兩二錢二味用新瓦文火炙乾為細末加冰片少許收固每吹入鼻中打噴一二次即消在左吹右在右吹左雙者左右俱吹嚴氏赤麟散治一切喉痹纏喉雙單蛾又喉惡症吹之立吐痰涎即時獲效可代刀針真仙方也只喉癬喉瘡虛症勿用真血竭五錢巴豆七粒去殼明礬一兩上三味打碎同入新砂鍋煉至礬枯為度每兩加冰片三分硼砂二錢再合研極細收固用時以冷茶漱淨口吹患處立效樞扶氏曰此環山方岫雲山人家藏祕方也治喉風諸症實有奇功雄黃解毒丸治一切急喉痹極危症明雄黃一兩川鬱金一兩巴豆十四粒去殼並去淨油共為細末醋煮麵糊為丸如緑豆大每服七丸清茶送下吐去痰涎立效如至死者心頭猶熱須用針匙挖開口灌之倘得下咽便許生活如小兒驚熱痰涎或兩丸或三丸量大小加減服之無不神效青冰散治喉閉雙單蛾奇妙膽礬二錢硼砂二錢共為細末取青魚膽一個入藥末於中陰乾去皮再研極細加冰片二分收固用時以男左女右吹入鼻內自效火刺仙方治一切喉痹纏喉脹滿氣閉不通命在頃刻者須急用之法用巴豆油塗紙上捻作條子火上點著煙起即吹滅令病人張口急刺於喉間俄然吐出紫血即時氣寬能言及食粥飲再用藥治之便立愈矣碧雪散治咽喉閉塞痰涎壅盛燈心灰硼砂共為細末每用少許吹入喉中即吐出痰涎自效碧玉丹治喉風急閉等症膽礬三錢白殭蠶六錢炒去絲嘴揀直者用上為細末加麝香一分收固每用少許吹入喉中立效絳雪治咽喉腫痛咽物妨礙及喉癬舌瘡等症寒水石二錢硼砂一錢辰砂三錢冰片三分孩兒茶二錢為極細末每用一錢摻於舌上津液咽之或吹患處真妙方也金鎖匙治喉閉纏喉風痰涎壅盛口禁不開湯水難下等症火硝一兩五錢硼砂五錢冰片三分雄黃二錢白殭蠶一錢各另研細再合研極細收固每吹少許入患處痰涎即出又方治纏喉風用白礬末五分以烏雞子清一個二味調勻細灌入喉中即愈又方治喉內生瘡不破者用藥吹之咳嗽一聲即膿出乳香五分去油沒藥五分去油枯礬五分出窩蠶繭一個燒灰五倍子一個燒灰人指甲三分炒壁蛛窩一個燒灰小紅棗一個燒灰各為細末每用一字吹之即效又鎖喉風閉方凡遇此症先於脰頸處搽香油用錢一文括之如刮痧樣其痛稍緩好乘熱進藥再刺十指與少商穴及四腕委中等穴更妙又治雙單蛾神方凡遇此症先看頭頂上有雙紫泡即雙蛾單紫泡即單蛾先用銀針挑破捏出紫血則患勢稍衰矣若看不出紫泡者謂之隱蛾先用桐油蘸於鵝翎上在舌根下絞出痰涎俟鼻中知桐油臭即止再用涼水好醋各半香油少許食鹽一捻共打數十下每含半口漱之骨鯁咽喉不下方以南硼砂一塊含化咽汁即脫然而失又法凡卡某魚之骨即取某魚生眼珠用腐皮裹好用力吞之即愈矣舌部舌者心之苗也心無舌則不能通暢其聲舌非心則不能轉達其理而脾者舌之本也脾和則知五味脾熱則舌破生瘡蓋舌性屬火腎水不竭之人則火得水制氣血和平病安從來如無其制則舌爍舌強舌瘡舌脹諸恙悉來矣治舌要訣降火滋陰四字耳黃連瀉心湯加味治舌上一切火熱症黃連五分黃芩五分連翹五分山梔五分元參五分花粉五分知母五分生地一錢半甘草三分水煎服元參升麻湯治心脾壅熱腮頰腫痛舌本強硬等症元參一錢五分升麻一錢五分甘草八分水煎服一方治舌腫色如豬肝不能轉動或滿口脹塞湯水難入者此心脾兩經壅熱症也其法先於舌尖或兩旁刺出紫血次用箸卷綿蘸甘草湯潤其唇舌再用生蒲黃三錢乾薑一錢冰片一分為細末向四面頻吹以杜其蔓延若唇乾難吹用蜜潤之多加冰片內服用元參一錢五分升麻一錢五分犀角一錢五分枳殼一錢五分炒膽星一錢甘草八分水煎服大便閉加大黃小便閉加滑石一方治舌下生小舌名重舌又名子舌痰也熱也其法用桑皮殭蠶等分發灰減半為末乾醋調敷舌下用金丹吹之更妙金丹方消腫出痰治喉舌一切熱症火硝一錢八分生蒲黃四分殭蠶一錢牙皂一分五釐冰片一分共研極細末收固一方治舌強系脾經壅熱或心脾受風皆令舌強不語黃連石膏半夏防風四味分兩斟酌用之水煎服一方治舌縱火與痰也黃芩三錢殭蠶一錢五分炒膽星一錢五分烏藥一錢水煎調竹瀝一錢服一方治舌麻火也痰也血不足也黃連五分黃芩五分連翹五分淨赤芍三分川芎五分當歸一錢生地二錢殭蠶八分炒甘草五分引加升麻二分水煎服一方治舌燥三焦蘊熱咽內必干黃芩一錢山梔一錢薄荷六分連翹一錢元參一錢花粉一錢麥冬二錢引加燈心一團水煎服一方治舌粗心脾熱動也黃連五分生地三錢木通一錢滑石二錢煅石膏二錢甘草一錢引加淡竹葉二分燈心一團水煎服一方治舌吐不收名曰陽強宜補陽如黨參黃耆之味水煎服外用生蒲黃三錢冰片一分為末頻頻摻之若舌出數寸在傷寒産後中毒大驚四種傷寒皆用冰片摻之或用紙卷巴豆一粒納鼻中自收産後用硃砂末敷舌余者用雄雞血浸之或冬青濃汁浸之一方治舌縮不言名曰陰強宜補陰如四物湯或地黃湯水煎服之四物湯方當歸三錢白芍三錢生地六錢川芎一錢地黃湯方熟地八錢山藥四錢山萸四錢茯苓三錢丹皮三錢澤瀉三錢一方治舌澀亦風火痰也防風一錢葛根一錢薄荷二錢茯苓一錢半夏一錢甘草五分引加連翹三分水煎服舌衄舌忽出血心火鬱極用槐花末摻之若但破不出血宜服黃連五分犀角五分童便少許舌卷亦是傷寒見症系足厥陰肝經煩滿消渴譫妄邪熱傳臟宜下之如承氣湯枳實一錢厚朴一錢大黃一錢芒硝五分水煎服分兩輕重量人之壯弱病之淺深斟酌之若身無熱四肢厥冷過肘過膝此為直中真寒病宜溫少陰如附子乾薑等藥舌腐潰爛飲食難進疼痛異常取地龍十條吳茱萸五分和生白麵少許醋調塗兩足心以絹縛之立效如神舌尖出血以生蒲黃擦舌上內服黃連一錢生用連翹三錢燈心二十根水煎服翣舌腫硬此症卒然舌大硬腫咽喉腫閉即時氣絶名曰翣舌至危之症急用皂礬不拘多少以新瓦火煅紅色放地上候冷研細以針鉗拗開牙關將藥頻擦舌上立效如神再以真百草霜三錢酒調服下治一切口舌生瘡黃柏八分黃連五分兒茶一分為末塗之舌忽脹大用雄雞冠血浸舌咽下即消婦人難産舌出不收何也用力以産子而心為之甚懼舌為心苗故子下而舌出也是舌出不收因心氣過升之故耳治法必須降氣為主古人有以恐勝之者然此症由於心過驚恐後用大聲以增其懼豈不重傷心氣乎雖舌暫收恐收後復出也求妥當治法宜服此鎮心湯人參三錢茯神二錢五味子一錢九節菖蒲五分水煎湯調硃砂末一錢含漱久之然後咽下即收矣連服兩三劑更妥牙齒部正中門牙上下四齒心包經也兩旁上下四齒肝經也再上下四齒胃經也再上下四齒脾經也再上下四齒肺經也再上下四齒腎經也治牙痛上品方不拘何經火痛此方統治其效如神元參一兩生地一兩水煎服火在心包加黃連五分在肝經加炒梔子二錢在胃經加石膏五錢在脾經加知母一錢在肺經加黃芩一錢在腎經加熟地一錢一方治火疼牙硝一錢樟腦一錢硼砂一錢青鹽一錢共為細末用涼水照患處擦立效一方治風火痛乳香一錢沒藥一錢雄黃一錢血竭一錢兒茶一錢石膏一錢煅存性火硝五錢共為細末男左女右用少許吸鼻內立止一方治冷疼胡椒兩粒母丁香兩粒皂礬二分共為細末用布包系咬在痛處流去黏水熱涎其痛即止一方治牙疼不可忍神效輕粉五分用布包緊咬牙痛處低頭流出涎沫外再用獨頭蒜一頭搗爛敷在手虎口上男左女右約一炷香時揭去蒜隨起一泡立時止痛一方治蟲牙痛川蒼耳三十粒川椒三十粒小黑豆三十粒上臘陳醋一碗煎至半碗每溫熱漱之即愈五靈至聖散治蟲牙疼五靈脂三錢白薇三錢細辛五分骨碎補五分共為極細末如塵方好先用滾水口含漱牙齒至淨然後用此藥末五分滾水調如稀糊入口內漱齒半日漱至氣急吐出如是者三次痛止而蟲亦絶矣走馬牙疳驗方凡大人熱病之後火毒留胃及小兒痘疹之後變患牙疳白腐口臭潰爛不堪或發痛癢齒脫腮硬多致不救用此治之即愈緑礬一錢炒紅石膏三錢煅兒茶一錢蓬砂一錢人中白一錢人中黃一錢冰片二錢共為細末以甘草湯浸絹帕拭去腐肉將舊筆頭蘸藥搽之治牙疳方大紅棗去核用人中白末填滿外用綿纏住放火內燒焦每棗一枚加入麝香二釐研細末塗之立愈治走馬牙疳方每見人糞內有人龍取來放瓦上焙乾研細末加青黛冰片各少許向患處吹之即愈又治牙疳異功散白霜梅二錢人中白五錢火煅枯白礬二錢大梅片二分共為細末先用韭菜根松蘿茶水煎濃汁乘熱以雞翎蘸洗患處去淨腐肉見鮮血再敷此藥若爛至咽喉者以筒吹之又方治牙疳堅硬青紫漸腐穿腮齒動搖者以此散擦之蘆薈二錢黃柏五錢白人言五分用紅棗五枚去核每棗納入人言一分火燒存性共為細末先用米泔水漱淨疳毒再敷齒患處治骨槽風方湯藥熟地一兩鹿角膠三錢石碎隔水頓化沖服好肉桂一錢白芥子二錢炒研甘草一錢炮薑五分麻黃五分水煎空心服治骨槽風方丸藥好肉桂一兩炮薑五錢麻黃三錢共為細末煉蜜為丸梧桐子大每服二三錢用半夏三錢廣陳皮三錢去白白茯苓二錢甘草一錢白芥子二錢生薑三片水煎湯送下犀黃丸治一切骨槽風並患乳岩瘰癧痰核橫痃肺癰小腸癰流注等症犀牛黃三分真麝香一錢五分乳香一兩燈心同炒去油沒藥一兩制同上共為細末取粟米飯一兩搗為丸如緑豆大曬極干忌烘每服三錢用熱陳酒送下飲醉蓋被取汗醒後癰消而痛亦息矣一方治牙根腫爛穿唇破頰並一切口瘡極妙胡黃連一錢膽礬二分兒茶二分為末擦之治牙根出血方用草決明一兩煎水噙之即止治牙關出血如線用槐花略炒為末以指頭蘸末塗之以止為度取痛齒法用白馬尾燒灰存性研細點上即落但不可沾好齒牙根腫痛方瓦松白礬等分水煎漱之立效牙根臭爛方芥菜根燒存性研末頻敷之即愈牙宣露痛方絲瓜蔓陰乾火煅存性擦之即止口部口之於味也皆統於脾脾熱則口臭脾燥則口裂脾冷則口紫脾敗則口黑脾寒則口青脾虛則口白脾衰則口黃脾熱則口冷脾實則口紅且唇為口之戶也唇病即口病也赴筵散治赤白口瘡黃柏青黛蜜陀僧各等分為末乾擦之治唇口生瘡方唇口四圍生瘡黃脂如蠟諸醫不應以旋覆花煅存性用香油調擦即愈治口舌糜爛方用大紅薔薇花之葉無葉時可用根放瓦上微火焙燥忌大火炒為末和冰片少許擦之即愈治口疳方兼治喉癬喉癰橄欖核三錢燒存性鳳凰退即小雞殼三錢燒存性兒茶三錢冰片二錢七分另研塗患處或吹入甚效口舌生瘡茄蒂燒灰敷之取其甘以緩火之義也滿口潰爛用生薑汁頻頻漱吐亦可為末塗之口出臭氣用大茴香煮羹食或含大茴香生食之口瘡方凡咽喉口舌生瘡以吳茱萸為末真米醋調貼兩腳心過一夜即愈紅白口瘡方蕊仁五分去油銀珠五分冰片一分熟棗三枚去皮核共合一處搗爛攤烏青布上貼頂心準一晝夜去之若干難去用無根水排藥極效唇乾方生地三錢麥冬三錢山藥三錢當歸二錢白芍二錢黨參一錢水煎調白蜂蜜少許服唇裂方煅石膏三錢黃連六分生地五錢石斛二錢甘草一錢五分竹茹六分水煎服唇瞤動不止方肝風乘脾也柴胡一錢防風一錢五分荊芥一錢五分山梔二錢薏苡仁五錢當歸三錢生甘草一錢五分真赤小豆二錢水煎服蠶唇方唇腫白皮皺裂如蠶繭或唇下如黑棗黨參一錢五分去蘆升麻五分丹皮八分洗山梔六分炒白芍一錢柴胡八分甘草一錢黃耆一錢五分炙白朮一錢土炒當歸一錢洗廣皮六分引用生薑一片大棗三枚水煎服唇瘡方因食少腸胃空虛三蟲作祟致令唇瘡聲啞咽乾真犀角一錢五分黃連一錢五分烏梅三枚木香五分桃仁五分雄黃五分水飛沖服水煎服亦有因氣鬱生瘡者用甑上滴下汗敷之如神或有白荷花瓣貼之亦效若小兒燕口瘡有燕窩土搽之或用發灰搽之皆效

此症初起發寒發抖或嘴唇內有塊如疔或耳根後作痛或肛痛或氣喘作嘔六脈微細筋骨疼痛麻木其象不一遇此症急將前藥服下切勿睡倒速挑手腳頭背胸肋痧筋之處如已挑無血急將老薑晚蠶沙擦之再挑放有血出便可無害此症一起即治方可無事如遲則難挽回矣再此藥一時不能即辦而此症起發甚速不能久待望信善君子預合施送十香返魂丹公丁香二兩木香二兩乳香二兩藿香二兩蘇合香二兩降香二兩海沉香二兩安息香一兩麝香一兩香附二兩訶子肉二兩殭蠶二兩天麻二兩玉金二兩蔞仁二兩礞石二兩甘草四兩建蓮心二兩檀香二兩硃砂二兩琥珀二兩京牛黃一兩冰片五錢大赤金三百張共為細末甘草膏兌白蜜為丸重一錢金衣蠟皮封固治男婦痰嗽中風口眼歪斜牙關緊閉昏暈死去或諸風狂亂見鬼神自言自語或哭登高薑汁送下行人夏月中暑卒暈死者香茹湯送下喜怒哀樂七情所傷死者燈心湯化下夜夢怔忡不寐神魂遊蕩重複又臥醒後不知人事燈心湯金子送下孕婦懷胎七八九月忽然死去此為胎暈人參硃砂湯送下孕婦胎哭有聲胎動蓮子心湯送下男婦大小人如醉赤金薑湯送下小兒急慢驚風天吊仰視口吐痰沫手足抽吊薄荷燈心湯送下男婦交合脫陽脫陰死者升麻湯送下萬應太平丹南星木香細辛羌活硼砂各五錢冰片二錢蟾酥三錢沉香檀香香櫞白芷各一兩佛手二兩上藥俱為細末切勿火烤擇天醫日設香案虔合和勻以磁瓶收貯勿令泄氣此丹專治一切風寒時疫胸膈不開胃氣疼痛四時痧脹等症嗅之立效兼治小兒急慢驚風痰迷厥症用化州橘紅湯送下腹中如響立刻回生治赤白痢疾以玫瑰膏拌之開水送立止以上諸症效驗如神幸勿輕視虔制奉送孕婦忌服立止瀉痢散茅山蒼朮八兩土炒川厚朴八兩薑汁炒砂仁一兩陳皮八兩炙甘草三兩藿香二兩以上六味研極細末此藥專治染受四時不正之氣腹瀉紅白痢疾頭痛身熱胸脅脹滿傷食停飲嘔吐噁心瘧疾邪穢山嵐瘴氣等症每服二錢或三錢用開水沖半盅溫服其效甚速塘西痧藥方凡痧脹痰厥猝中寒暑不省人事及驚風險症牙關緊急者只以四五丸研末吹入鼻內即蘇再服六七丸即愈茅山蒼朮三兩色黑而小而硃砂點者為佳米泔水浸軟切片曬乾為末丁香六兩不拘公母為末明天麻三兩六錢切片焙乾為末錦文大黃六兩切片曬乾麻黃三兩六錢去節細銼曬乾蟾酥九錢好燒酒化舌舐即麻者為真麝香三錢上好者甘草二兩四錢去皮微研雄黃三兩六錢透明細研水飛硃砂三兩六錢細研水飛為衣用上藥十味各研細末用五月五日午時或擇天醫吉日於淨室中虔制以蟾酥燒酒化為丸如藥末不能膠黏酌和以糯米漿丸如蘿蔔子大用硃砂為衣曬乾磁瓶收貯硃砂為衣將兩碗對合用手拋擲使藥丸在內磨蕩自能堅實而光中暑頭痛眼黑及絞腸腹痛一時閉悶不省人事及斑痧等症先用二丸研細吹入鼻內再將三丸納之舌下發麻陰陽水或涼水送下中寒驟然腹痛陰陽反錯睡臥不寧轉筋吞瀉手足厥冷且吐瀉不出猝然難安者治法如前山嵐瘴氣夏月途行及空心觸穢口噙三丸邪氣不侵感冒風寒噁心頭痛肚腹飽脹及風痰等症治法如前癰疽疔毒及蛇蠍毒蟲所傷搗末好酒調敷立效小兒發痘不出閉悶而死及痰涎壅盛等症用藥二丸研末吹入鼻內即蘇急救痧氣丸一名截痧丹真茅山蒼朮米泔水浸三日炒研末嵮乾蟾酥腰面雄黃另研細丁香另研細枯骨廣木香微烘勿炒另研細飛滑石另研細辰砂水飛過另研細以上各一兩二錢麝香三分要取真原麝黃香佳上將諸末和勻再碾千餘下以燒酒浸烊蟾酥搗為丸如芥菜子大每服三丸陰陽水下痧重者加二丸凡修合完備於太陽旺時曬熱盛大碗內上蓋瓦盤乘熱搖顛丸色光亮用瓶盛貯備用勿令泄氣

body:
  text: 卷之三前後二陰脾胃筋聚陰器肝筋脈結陰器腎筋結陰器後陰肛門是肺與大腸所主之地肛門後尾骨尖名尻尾系膽筋結處治小便不通點滴不能出急悶特甚心煩意燥口渴因心火亢極者蓮子青心一錢麥冬一兩茯苓五錢車前子三錢夏布包煎水煎服治小便不通眼睛突出面紅耳熱口渴煩躁因膀胱火盛者王不留行五錢澤瀉三錢白朮三錢水煎服治小便不通少腹作脹然不疼痛上焦亦不煩躁口亦不渴舌亦不幹繫命門火衰膀胱之氣不化者大熟地一兩山萸五錢蒸山藥五錢茯苓五錢丹皮三錢澤瀉三錢川附子一錢炮肉桂二錢研細沖服水煎服又方治小便不利服利水藥不效服此方即效升麻一錢柴胡一錢黃芩一錢五分黃連一錢五分黃柏一錢五分山梔二錢青皮一錢五分木通一錢五分通草五分水煎服以上四方皆治小水不通方也因心火膀胱火或命火衰或三焦與肝火小腸火盛者若夫淋瀝閉癃之症宜開鬱行氣養血滋陰則用此琥珀散甚效川鬱金一錢搗青皮一錢五分木通一錢五分牛膝三錢全歸五錢大生地一兩黃柏三錢水煎調琥珀研末一錢服又治小便不禁方山萸肉五錢五味子三錢當歸五錢白芍五錢益智仁三錢大熟地八錢炒黃柏二錢水煎服又治婦人咳嗽即有溺出者潞黨三錢麥冬五錢白朮三錢當歸三錢柴胡二錢黃芩二錢青皮一錢五分五味子一錢五分水煎服又治小便出血溺管痛不可忍者淡豆豉五錢水煎湯溫服又濕鬱白濁方凡少年思欲不遂相火鬱結兼受濕熱致有此症以川軍三錢裹入無餡饅頭內蒸熟晾燥炒研細末以生白酒調下即瘥又一方用六一散涼開水調服三錢日服三次亦愈並治小兒溺尿如米泔者減半服之立效如神六一散是六兩滑石一兩甘草同研末又治白濁方欲過所致益智仁二錢川萆薢三錢石菖蒲一錢五分烏藥一錢五分茯苓三錢甘草一錢五分水煎服又治赤濁方虛熱所致遠志肉一錢五分石菖蒲一錢五分黃芩一錢骨皮一錢茯苓一錢炙草一錢石蓮子一錢車前子一錢麥冬一錢黨參一錢黃耆一錢水煎服又治小便利如泔汁方腎虛所致桂心一錢白石脂二錢牡蠣二錢煅菟絲子二錢黃瓜藤根一錢共為細末每服一錢日三服用大麥湯調下又治思慮過度神不安遺精白濁方遠志肉兩半茯神一兩人參六錢酸棗仁五錢牡蠣五錢五倍子五錢枯礬五錢龍骨五錢煅共為細末棗肉為丸梧桐子大每服三錢麥冬湯下豬肚丸治一切遺精白朮五兩土炒苦參三兩牡蠣四兩煅共為細末用雄豬肚一個入藥末在內煮爛放石臼中共搗為丸梧桐子大每服三錢日三服白開水送下又治虛損遺精或兼筋骨痠軟或兼盜汗皆效山藥二兩枸杞二兩黃耆二兩石蓮肉二兩知母二兩鹽炒黃柏二兩鹽炒五味子二兩菟絲二兩茯苓二兩人參兩半去蘆瑣陽一兩酒洗酥炙蛤粉二兩沙苑蒺藜二兩共為細末用白朮三兩土炒山藥三兩水熬取汁成膏和丸梧桐子大每服三錢用淡鹽湯送下治忽心有所動寐即遺精黃柏四錢砂仁二錢豬苓五錢茯苓五錢黃連五錢白芷五錢益智仁五錢甘草一錢共為細末用芡實三兩研末打糊為丸梧桐子大每服三錢淡鹽湯下治才睡即泄龍骨煅韭子各等分共為末酒調服三錢治遺精心神不定方名妙香散龍骨五錢益智仁五錢人參五錢茯苓三錢遠志三錢茯神三錢硃砂一錢炙草一錢共為末酒調每服三錢治有所聞見不待寐即出亦用前妙香散方內再加入鍾乳粉五錢煉陽起石五錢煅紅酒淬放陰地上牡蠣七錢煅白石脂五錢瓦上煅紅共為細末用糯米飯糊為丸桐子大放土上一日出火毒每服二錢用人參湯放涼送下保生丹治夢遺效方枸杞八錢熟地四錢柏子仁四錢去油蓮蕊四錢酒煮菟絲子四錢芡實四錢龍骨二錢煅共為細末用金櫻子去淨毛蟲刺用淨肉一兩四錢水煎濃湯和煉蜜為丸桐子大每服三錢白開水送下治莖腫溺澀作痛方萹蓄四錢瞿麥三錢滑石二錢甘草一錢燈心一子水煎服若便秘加大黃煎服治陽莖挺脹方甘草梢二兩黑豆半升水煎濃湯空心服治腎漏長硬不痿精出捏之則脆癢如針刺補骨脂韭子各一兩研粗末每服三錢水煎服一日服三次治莖紅熱腫生瘡膽草一錢連翹一錢生地一錢澤瀉一錢車前子五分木通五分歸尾五分山梔五分川連五分條黃芩五分水煎服便秘加大黃治腫破潰爛作痛胡連一兩黃連一兩蘆薈一兩蕪荑一兩青皮一兩雷丸一兩鶴蝨草一兩麝香一錢木香三錢蒸餅為丸每空心服一二錢白開水送下治下疳腐爛銀粉丹錫六錢硃砂末二錢同炒至砂枯時去砂將錫化開入水銀一兩另用好粉一兩研細卷在紙條內點火燒盡去灰用粉同前藥和勻再入輕粉一兩共研極細糝患上止痛生肌收斂須先用甘草湯洗淨後上此藥治腐爛疼痛及新肉已滿不能生皮靛花一錢珍珠二錢用豆腐內煮輕粉二兩共為極細末若下疳初起皮損搽之即愈若日久爛者用甘草水洗淨用豬脊髓調搽諸瘡不生皮干糝亦好治婦女陰戶腫痛肝家之濕熱所致也當歸一錢白芍一錢川芎一錢生地一錢山梔一錢黃連一錢連翹一錢膽草一錢柴胡六分澤瀉六分木通六分滑石一錢蘆薈五分防風八分甘草三分引加淡竹葉一捻燈心一子水煎服治婦女陰中作癢杏仁去皮尖輕粉水銀鉛製雄黃各一錢共為末每用五分以棗肉一枚和丸用綿裹留綿頭在外先用威靈仙苦參蛇床子歸尾狼毒鶴蝨草各三錢水熬湯入豬膽汁二枚乘熱先薰後洗洗後即將綿裹藥丸安入陰中每將小便時取出溺完再安入一日一換以愈為度至重者亦不過五七丸然內要每日煎一劑涼血湯服涼血湯此方湯藥日服一劑又可以治婦女陰中痛如淋症者當歸川芎白芍生地山梔黃芩黃連木通柴胡上各一錢半茵陳膽草知母麥冬上各一錢甘草五分川軍三錢便秘者加入利者去之引用淡竹葉三分燈心一子水煎服治女人陰吹方前陰放空如撒屁之聲名為陰吹胃氣下泄也豬板油八兩亂髮用雞子大一團以肥皂水洗淨放鐵勺內火上熬至發烊分兩次服此方可兼治男女黃疸治大便氣秘欲下不下名陽秘脈數能食者當歸五錢洗麻仁三錢研枳殼二錢炒檳榔三錢木香一錢陳皮二錢杏仁三錢炒研刺蒺藜五錢酸棗仁五錢研水煎服治大便糞結陰液不足腸燥肛裂名陰結脈沉遲不欲食者當歸五錢桃仁二錢麻仁三錢瑣陽五錢肉蓯蓉五錢刺蒺藜三錢酸棗仁三錢水煎調豬脂三錢生蜂蜜五錢服又有風秘症大便時聲如裂帛壅塞不快者即將前治陽秘方內加防風紫蘇葉各一錢五分煎服又有似秘非秘症年高人久病人多有之因津虧血短耳熟地八錢山萸四錢山藥四錢茯苓三錢澤瀉三錢丹皮三錢瑣陽五錢肉蓯蓉五錢人參一錢五分黃耆一錢五分水煎勻兩三次溫服一日服一劑治大便出溺小便出糞名交腸病好阿膠二錢炒珠白朮一錢二分土炒茯苓一錢二分豬苓一錢二分澤瀉一錢二分廣縮砂八分藿香一錢六分白蔻四分去皮公丁香四分檀香四分廣木香四分炙草一錢六分水煎調肉桂末一錢二分服治痔初起腫痛用皮硝一把煎濃湯熱薰溫洗再用一烘熱舊布鞋底墊坐再用豬大腸煮爛蘸蜜空心徐徐食之如此法連治七日自愈治便血及痔瘡烏梅好醋煮爛去核半斤百草霜即鍋底煙煤刮下用研末三兩胡黃連四兩用豬大腸一節裝好兩頭以綿縛固在飯鍋內蒸以腸爛為度去腸曬乾研細末用以上三味共搗成膏再作丸桐子大每日清晨服三錢白開水送下一料即愈治痔瘡疼痛胡黃連研用鵝膽汁調敷之治穿腸痔漏諸痔皆效水安息香要真的每日早晚用少許塗之十數日即愈治痔漏兼治牛皮癬黃蜂窩一個內有蜂子者方有力明礬研細末以礬填滿蜂窩用微火煅之俟窩內礬滾透窩亦成灰研細以香油調搽患處痔漏仙方圓眼肉四兩川黃連一錢犀角尖二錢白礬二錢共搗為丸如桐子大硃砂為衣每空心時即服七八粒茶水任下治男婦久痔不痊翻花疼痛難忍方番木鱉一個冰片七釐用極粗碗底以熱水研汁塗之即愈每月塗一次又方用真象牙研細末豆腐皮水泡軟裁成小塊包五包每包二分早起空心喝豆腐漿一口送一包連服五包約每日服象牙末一錢連服十日能多服更好內痔不出先用溫水洗淨肛門隨用吐津調生草烏枯礬五錢刺蝟皮一錢燒灰存性麝香五分冰片二分食鹽三錢炒研細末調三錢填入肛門片時痔即出去此藥上後藥痔出後再用此藥白芨三錢石膏三錢黃連三錢冰片二分麝香二分共研細末以雞子清調成膏圍護痔外邊再上後藥圍護妥再用此藥塗瘡頂上白礬二兩蟾酥二錢輕粉四錢砒霜一兩天靈蓋煅紅水淬七次用四錢共為末入鐵窩內蓋好鹽泥封固炭火煅二炷香時俟冷開出研末磁瓶收貯每日辰午申三個時辰搽三次臨搽先用溫水洗淨將四圍塗前藥再用此藥搽頂上連搽七八日看痔枯黑堅硬裂縫待其自落然後用後藥痔枯黑裂縫時以此藥洗之黃連黃芩黃柏梔子川軍防風荊芥槐角苦參甘草各一兩朴硝五錢分三次水煎洗痔真落再上後藥以收功痔落孔竅不收上此生肌乳香沒藥海螵黃丹赤石脂龍骨血竭熊膽輕粉麝香冰片珍珠研極細末早晚搽二次蓋膏漸斂兼服補藥半月收功外痔亦可照此法除生草烏刺蝟皮方不用以下四方皆按次第施治皆好然均宜忌房事百日治脫肛方先用肥皂水洗再用五倍子研細末塗以絹托而上之連治十次治大便內穀道作癢方先用雄黃和艾葉燒煙燻之日熏一次連熏三次再用蜣螂七個預於五月五日收臨用去足翅炙焦為末合新牛糞五錢肥羊肉一兩炒香共搗如膏丸如蓮子大炙熱以新綿薄裹納穀道中半日少吃飯即大便蟲出三五次全愈治肛門腫痛方木鱉肉五個研如泥安盆內以沸湯沖洗之另用少許塗腫處治尻骨處腫痛將欲成瘡方當歸二錢白芍一錢川芎二錢生地二錢柴胡一錢六分黃芩一錢六分知母一錢六分川貝一錢六分澤瀉一錢地骨皮一錢甘草一錢生薑三片水煎服治尻骨處已成瘡方潞黨二錢黃耆二錢白朮二錢陳皮二錢茯苓二錢當歸二錢生地二錢丹皮一錢甘草二錢沉香一錢水煎服治尻骨處瘡破不收口方黨參二錢黃耆二錢白朮二錢茯苓二錢當歸二錢生地二錢杜仲二錢山萸二錢丹皮二錢桂心一錢白附子一錢甘草一錢生薑三片大棗三枚水煎服治穀道前腎囊後生瘡名懸癰又名騎馬癰驗方金銀花四兩蒲公英二兩天花粉三錢全當歸二兩生甘草一兩好人參五分川大黃五錢水煎服此方頗效莫嫌分兩大連服三四劑即可全愈腿膝足腳部肝脾腎三陰統乎下體膝屬肝脾腎足肚名腨屬膀胱外臁屬足三陽內臁屬足三陰足大指外側屬肝內側屬脾中指屬胃第四指屬膽小指屬腎足根屬膀胱腎足心屬腎三因勝駿丸治下部一切痛兼治鶴膝風當歸洗天麻煨牛膝浸棗仁炒熟地防風各二兩附子片一兩炮木瓜四兩洗全蠍檳榔萆薢肉蓯蓉制故紙巴戟洗蒼朮各一兩炒川羌炙草木香乳香去油沒藥各五錢去油麝香一錢共為細末蜜丸桐子大每空心服三錢鹽酒送下雷火針法治一切腿痛乳香官桂血竭丁香麝香各六分杏仁一分四釐真蘄艾一兩木香六分沉香四錢檀香四錢各為粗末捲紙捻用香油蘸點著吹滅照穴道針之治膝蓋處痿軟無力或痛如針刺熟地八錢山萸四錢塊苓三錢澤瀉三錢山藥四錢丹皮三錢牛膝三錢車前子三錢水煎服治下體痿病手足痿軟無力百節縱緩不收下身瘦弱不能步趨及手足戰搖
極丸凡疫癘流行之時小兒作熱即是染疫乍有眼目上竄角弓反張手足搐掣不可誤認驚風但用此丸治之自愈天竺黃五錢膽南星五錢酒川軍二錢直殭蠶三錢梅花片二分真麝香二分共為細末端午日午時修合煉蜜為丸如芡實大硃砂為衣凡遇疫疾用薑湯化服一丸神效消風丸能疏通腠理清解表邪發散皮毛流通經絡凡治小兒諸班癇症先將此丸日服一丸連服七日南薄荷羌活獨活防風天麻芥穗川芎細辛以上各一錢膽星三錢為末蜜丸重一錢每日服一丸用薄荷湯化服定癇丸治小兒癇症服前方不愈者以此健脾補中方久久服之自然痰亦不生而癇亦不作矣人參一兩切片焙乾漂白朮兩半切片土炒白雲苓一兩切片薑汁蒸曬真廣皮一兩酒炒石菖蒲五錢用九節者切片白當歸一兩酒洗曬切片青化桂五錢去皮潯桂不用杭白芍一兩酒炒漂蒼朮一兩用黑芝麻拌炒南木香五錢忌火真龍齒一兩火煅醋淬研末水飛過曬乾取五錢赤金箔三十張半夏一兩法制鏡面砂三錢研末水飛曬乾研細上藥各依分兩炮製合一處焙乾研細煉蜜為丸龍眼核大以硃砂為衣外貼金箔曬乾磁瓶收貯每日早午晚各服一丸薑湯化服金粟丹專能疏風化痰清火降逆並治咳嗽上氣喘急不定嗽聲不轉眼翻手搐凡諸家截風定搐之方皆不及此方之聖藥真九轉膽星二兩明天麻二兩薑汁拌炒節白附一兩土炒淨全蠍揀去尾足以滾湯泡淨去泥鹽曬乾一兩炒明乳香去油淨二兩代赭石火煅紅以好醋淬之煅七次淬七次水飛一兩赤金箔五十張真麝香二分梅花片三分共為細末煉蜜為丸皂角子大金箔為衣每用一丸薑湯化服此方比抱龍金液保命至寶定命等方功倍十倍惟虛寒之痰無根之氣凡絕脫症候不可再用此藥也沆瀣丹沆瀣音亢械北斗星夜半時所降之甘露名也專治小兒一切胎毒胎熱胎黃面赤目閉鵝口口瘡重舌木舌喉閉乳蛾渾身壯熱小便黃赤大便閉結麻疹斑瘰遊風癬疥流丹癮疹疾食風熱痄腮面腫十種火丹諸般風搐神效杭川芎九錢酒洗錦莊黃九錢酒蒸實黃芩九錢酒炒黑牽牛炒研取頭末六錢厚黃柏九錢酒炒薄荷葉四錢五分粉滑石水飛六錢尖檳榔七錢五分童便洗陳枳殼四錢五分麩炒淨連翹去淨心隔六錢京赤芍六錢炒上各味依方炮製共焙燥研極細末煉蜜為丸如芡實大月內之兒每服一粒稍大者兩粒俱用茶湯化服乳母切忌油膩但覺微有泄瀉則藥力行病即減矣如不泄再服之重病每日三服以愈為度此藥實不峻厲不峻厲不要疑畏惟胎寒胎怯面青白者忌服三仙丹專治小兒縱口飲啖食物過多以致有形之物填塞腸胃之間不能轉運傳送脾氣抑鬱所以發熱不退眼閉難開人事昏沉四肢攤軟儼然虛症之象古人謂大實有羸狀即此症也昧者以為虛證而峻補之或疑為驚風而鎮墜之遂百無一活矣速以此丸同沆瀣丹同服待其下後人事即清矣又如痢疾症誤用澀藥閉其濕熱比食物有之滯塞殆有甚焉宜速下之不下即死急服此丹五靈脂二兩南木香五錢巴豆仁四十粒上將上兩味研細末以巴豆剝去殼取淨肉四十粒再去其肉上嫩皮用包水濕入熳火極熟取起另以綿紙包之緩緩捶去其油紙濕則另換以成白粉為度謂之巴霜與前兩味和勻醋打麵糊為丸如綠豆大以硃砂為衣曬乾收貯每服五丸或七丸量兒大小加減合沆瀣丹二三丸同研爛茶清送下待其下後其病立愈此起死回生之藥勿以常方視之理中丸專治小兒真是脾虛中寒面青腹痛寒嘔寒瀉四肢厥冷一切虛寒者要看其頭額冷手足冷口中氣冷面色暗淡大便瀉者乃系此丸所治之症官揀參二錢去蘆漂白朮二錢土炒乾薑炭一錢五分炙甘草一錢共為細末煉蜜為丸五分重每服或一丸或二三丸用大紅棗去核蒂水煎湯放涼調服瀉清丸凡幼科方中一切截風定搐之方每用金石腦麝無益有損惟此方清心平肝疏風涼血凡小兒作熱不退將成風搐或已成風搐但服此丸其應如響真是幼科截風定搐之第一良方也川羌活一兩正川芎一兩黑梔仁一兩龍膽草一兩全當歸一兩北防風一兩錦莊黃五錢上藥合一處以火烘燥研細末煉蜜為丸青黛為衣如大豆大每一二丸茶清化下消癖丸治癖在脅下面黃肌瘦午後發燒似瘧者此攻補兼施之藥也見功雖緩然久服癖自愈官揀參切片焙乾漂白朮土炒正廣皮酒炒白雲苓乳蒸杭青皮醋炒川厚朴薑製小枳實麩炒法半夏焙廣砂仁酒炒六神麯炒麥芽炒上十一味各二錢京三稜一錢煨蓬莪朮一錢煨南木香二錢青化桂一錢炮黑姜一錢正雅連二錢薑汁炒九肋鱉甲三錢炙共為細末米粉糊丸小綠豆大每服一二錢米飲送下以癖消藥止化癖丸治癖積心腹內結如拳及臍腹痛不可忍者錦莊黃一兩酒蒸炮黑姜五錢熟附子三錢九肋鱉甲八錢用好醋將鱉甲煮一炷香時取起再用酥炙黃色同上三味共為細末以過三年老陳醋一升熬至半升合丸如綠豆大每服十丸或十五丸空心米湯下取下積如魚腦敗血爛肉青泥即愈以後須用補脾藥調理又治小兒積症方小兒秉賦本弱又兼乳食不足或斷乳太早不能不兼用飯面等物哺養惟小兒腸胃薄微有時不能運化隨成五積六聚始而面黃肌瘦精神日少繼則項細發稀腹生痞塊再久則生蟲上攻唇齒遂成牙疳不治之症服此神效海螵蛸五兩米硃砂一兩史君子肉三兩共為細末要極細如飛塵方好每服一錢用羊肝一塊煮極熟分小塊沾服忌用鐵器治疳積生蟲神效方雷丸一錢檳榔一錢黑醜五分頭末五穀蟲一錢瓦上焙史君子肉五個切片焙共為細末每服三分以雞蛋一枚打破空頭納藥於內外用濕紙封固飯鍋上蒸熟令兒食之藥完病愈百選肥兒丸治小兒脾胃虛弱飲食不消肌膚瘦削多服真能令兒肥胖與別方肥兒丸不同也廣縮砂六錢酒炒漂白朮一兩土炒山楂肉四錢炒杭白芍四錢酒炒建蓮子二兩四錢去心皮炒廣陳皮四錢酒炒法半夏四錢炒真雅連二錢薑製苡仁米六錢炒官揀參一錢焙切片六神麯六錢炒炙草二錢白雲苓一兩乳汁蒸曬共為細末煉蜜為丸彈子大每早晚各服一丸米飲送下外科隨錄治無名腫毒神效方若初起時連服一二劑即愈珠白芨五錢澤蘭葉五錢黃明膠五錢另用酒化沖服更好同煎亦可水煎點燒酒少許服臨睡前服服後接飲陳酒能飲至酩酊更好蓋被出汗為度人身以臍為中如患在臍以上及頭面者加白芷三錢臍以下者加牛膝三錢毒盛者加川軍三錢紅腫盛加紫花地丁三錢蒲公英三錢不紅而腫加川芎二錢桃仁三錢元氣虛者加生黃耆三錢血虛加當歸五錢有濕加炒焦川柏二錢蒼朮三錢小便不利加滑石五錢大便不利加川軍三錢有外感加蘇葉三錢桔梗防風各二錢川羌三錢青龍丸治一切疔瘡腫毒並跌僕閃肭傷筋攣痛貼骨癰疽兼治男婦頸項瘰癧及乳串結核痰氣滯凝硬塊成毒小兒痘發癰等症真仙方也馬前子一名番木鱉以米泔浸三日三夜刮去皮毛切片晾燥香油炒透四兩川甲片炒黃色用一兩二錢白殭蠶炒斷絲用一兩二錢共為細末以黃米飯搗勻為丸梧桐子大每服五分量人虛實酌減臨睡時按部位用引藥煎湯送下蓋暖睡勿冒風如冒風覺周身麻木抽掣甚則發抖不必驚慌過片刻即安毒初起者一二服即消散已成膿者服此自能出毒不必咬頭開刀誠外科家第一妙方也各經引藥用水煎湯送頭面川羌川芎各五分肩背角刺五分兩臂桂枝五分胸腹枳殼五分兩肋柴胡五分腰間杜仲五分兩足膝牛膝木瓜各五分咽頭桔梗甘草各五分若系人年老氣血弱及婦人新產半月以內者止服四分小兒周歲以內者服九粒以外者十一粒三歲者服十五粒可歲長氣壯漸加兩三粒如不能吞送以開水或甜酒調化服又治男婦瘰癧痰毒用夏枯草煎湯服黃酒亦可治對口仙方此瘡名為夭疽十有九死可不慎乎鯽魚一尾去鱗腸搗爛入頭垢五六錢再搗勻加蜂蜜三四兩攪勻從外圖入裡面留一孔出毒氣二次全消即時止痛如已成形有頭將要出膿或他醫已治不效而出膿者內服三香定痛飲則能起死回生矣三香定痛飲原方無分兩臨用延醫酌定木香紫蘇桔梗厚朴烏藥川芎當歸芍藥人參黃耆防風白芷甘草官桂沒藥乳香引用生薑三片紅棗二枚水煎食後服治對口發背及一切癰疽潰爛有回生功效官粉一兩輕粉銀珠雄黃乳香去油沒藥各二分五釐去油共研極細末聽用先將好茶葉煎濃湯洗患處後用豶豬腰子切開糝藥五分於腰子上蓋患處待藥如蒸良久取去一日一次拔毒減痛潰出膿穢不可用手擠輕者二次愈重者七八次愈呂祖治發背靈寶膏桐盧一人因母患發背百治不痊得此方愈大枯蔞五枚取子去殼乳香五塊如大棗大者二味共研細末以白蜜一斤同熬成膏每服三錢溫黃酒化服治發背如神真秘方狗牙要大者炒黑研末聽用先將生蔥熬湯洗瘡再將前末用好醋調敷患處即愈梅花五氣丹治腦疽發背諸般疔腫初起寒熱交作筋骨疼痛有似傷風噁心嘔吐但未成膿者並宜服之梅花片五分輕粉六分辰砂六分當門子麝五分乳香一錢沒藥一錢瓜兒竭一錢明雄黃一錢真酥散預於端午前尋之至午日取酥二錢用頭男乳調膏上藥各研極細對準分數於端午日辰時制妥候至午時將上藥九味和入蟾酥膏內向日丸之如茄內子大一時內曬乾用川椒二十七粒燈心二十七段同藥收於罐內養之以蠟封口不泄藥氣為妙凡遇惡瘡大毒開器取出一枚先用美饌食飽次用無根水漱淨口內再含水一口少頃待溫用蔥白五寸同水嚼爛嚥下隨將藥餅安放舌下睡於暖處以被覆蓋藥化苦水徐徐咽之瘡勢大者二三餅亦可藥盡其汗即到如淋諸病若失如冬月寒天難汗噙後將蔥白湯催之亦妙凡治無有不效如暗疔症人所不知覺及知覺而失治者毒氣入里人便昏沉一中便倒不能依法服藥急用連須蔥白七個煎老酒一杯研藥五餅灌下藥氣到心其功如湯潑雪患者即蘇真外科第一方也蟾酥丸治疔瘡發背腦疽乳癰附骨臀腿等疽一切惡症歹瘡不痛或麻木或嘔吐病重者必多昏憒此藥服之不起發即起發不疼痛即疼痛疼痛甚者即止昏憒者即蘇嘔吐者即解未成者即消已成者即潰真有回生之功乃惡症中至寶丹也蟾酥二錢酒化輕粉五分枯礬一錢寒水石一錢煅銅綠一錢乳香一錢沒藥一錢膽礬一錢麝香一錢雄黃二錢蝸牛二十一個硃砂三錢上各為末稱准於端午日午時在淨室中先將蝸牛研爛再同蟾酥和研稠黏方入各藥共搗極勻丸如綠豆大每服三丸用蔥白五寸令患者自嚼爛吐於男左女右手心包藥在內用無灰酒一茶鍾送下蓋被暖臥一時許出汗即效重者再進一服修合時忌婦人雞犬等見立馬回疔丹治疔瘡初起用針刺後又或誤灸失治以致瘡毒走散不住乃疔走黃險惡症也急用此錠插之蟾酥酒化硇砂輕粉白丁香各一錢蜈蚣一條炙雄黃硃砂各二錢乳香六分麝香七釐金頂砒五分共為細末糊成麥子大要細要尖凡看疔瘡針破用此一粒插入孔內膏蓋之次後追出膿血疔根為效治一切癰疽大毒發背對口腰疽臂癰腐肉黑暗死肌堅硬臭穢難聞用此摻之膏蓋過夜即周迴裂縫與好肉分界膿流肌活癟音瞥肉色枯也色轉紅疼痛稍緩其腐肉自脫不用刀鉗剪割穢氣亦無神效無比此名金素丹又名黃靈丹也生白礬六錢枯白礬三錢腰面雄黃一錢共研極細篩過再碾千餘下其色愈美裝磁瓶內臨用取出勿使染塵凡去腐肉儘可用之若新長肉上摻之要痛片刻一見膿水濕氣即不痛矣如良腐間混須先將後金花散摻好肉面上腐處再摻此丹自不痛也此丹用粉糊打條子亦可去輕淺不彎之管屢試屢效凡生盤根牙癰毒勢串沿滿口腐爛其牙床骨竟有通身一扇脫落者須用桑皮紙或棉條摻此藥在上卷作捻式塞於牙根邊久塞可保不脫如遇飲食可去藥條日換數次亦無妨礙金花散專治男婦新久爛腿連年不愈臭腐不堪並治腳發臁瘡等症及一切癰癤毒用之亦能去腐生肌長肉收功外科書中亦稱此藥為珍珠散煨石膏一斤研極細飛淨東丹一兩上二味和勻再篩再碾如治爛腿臁瘡用真香油調擦上蓋油紙一日一換不可用茶水淨洗如有膿水流開只可抹好肉上瘡口莫見濕氣如婦女月信時瘡愈復發再搽即愈珍珠散一名奇效八寶丹治瘡毒膿腐已盡用此摻上即能生肌長肉平口收功神效無比珠母拾取露天大蚌殼左顧者半片括背後黑衣安火上煅研細末用蘆甘石三兩以黃連二錢煎汁煅淬數次研極細血竭三錢粉口兒茶一兩煨石膏三兩赤石脂三兩煅陳年絲吐渣一兩煅存性梅花冰片臨用時凡藥五錢兌入冰片一分上共研勻極細碾如香灰式磁瓶盛貯聽用此藥比珍珠西黃八寶丹功效倍之幸勿輕忽治冷疔方一名兔齒一名足跟痛其患即腳後跟下無頭無腦不紅不腫唯夜間內挑痛難忍數月破頭即不治矣山甲五分炒皂刺五分歸尾二錢甘草一錢銀花三錢赤芍一錢乳香一錢去油沒藥一錢去油花粉一錢五分防風一錢川貝一錢去心白芷一錢陳皮一錢五分羌活一錢川膝一錢木瓜一錢蒼朮三錢黃酒兌水煎服連服十劑復生湯治疔毒內攻面腫欲死者蒡子牡蠣皂刺銀花梔子花粉木通骨皮乳香沒藥殭蠶川軍各等分便秘加朴硝一錢用磨刀鏽漿水一鍾黃酒一鍾煎服大便行一二次即蘇出汗生無汗危解毒清火湯治疔瘡誤灸逼毒內攻煩躁譫語者此方與復生湯同功可選用之元參桔梗知母石膏升麻梔子麥冬木通大青葉人中黃各一錢便秘加川軍芒硝悶亂加燒人糞加淡竹葉五分燈心三十寸水煎服治腫毒初起時疼痛不可忍方紅花五錢川甲五錢炒歸尾三錢黃酒煎去淨渣調阿魏五分研細末麝香五釐研細末服又方治同前用雞子一個開一小孔納入整斑蟊一個以濕紙厚裹燒熟連斑蟊食之即愈見一人腿腫疼痛服之即愈然必於初起三日內服始妥接骨秘方亦名七釐散能活血化瘀止痛安神真能續筋接骨的系良方也乳香二錢去油沒藥二錢去油血竭三錢猴姜三錢去毛硼砂二錢熟軍二錢自然銅二錢醋煅當歸三錢酒洗土鱉蟲五錢制半兩錢如不能得以開元錢代之醋煅數次用二錢共為極細末每服七釐至多萬不可過三分用黃酒送下制土鱉蟲法用瓦兩塊先仰放一塊上面鋪新鮮柏葉一指厚將土鱉蟲肚向下放勻在柏葉上然後以彼瓦合定將瓦兩頭及兩旁縫處用土泥封固安置火爐上俟柏葉盡焦土鱉蟲盡出汗為度煅自然銅要火煅醋淬七次煅半兩錢須十餘次因其銅性甚堅不多經淬煅則不能研末也

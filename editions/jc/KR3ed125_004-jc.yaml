body:
  text: 卷之四內科觀音大士救苦神膏偏正頭風左患貼左右患貼右正患貼印堂兼卷條塞鼻孔中服甘草水眼科七十二症腫痛將耳上角針刺出血貼上星翳膜倒睫迎風流淚將膏藥卷條左患塞左鼻右患塞右鼻中常服甘草水喉嚨三十六症單蛾雙蛾喉半喉風貼喉上口含甘草水要速效將膏含化吞下不服甘草水如喉腫閉急將銀針刺破腫處吐出黑血再吞膏藥牙疼貼上即止不服甘草水諸般疼痛均貼患處服甘草水中風癱瘓左患貼左右患貼右服甘草水不省人事痰聲如鋸作丸開水送下其痰立下如牙關緊閉用烏梅擦牙即開作條塞鼻中真有起死回生之功癆瘵貼夾脊穴尾間穴肚臍服甘草水七日勞蟲盡死咳嗽吐痰貼前後心仍服清痰降火補藥此膏能攻病不能補虛不可吞服臌脹水臌氣臌血臌俱貼肚臍丹田勿服甘草水噎膈氣膈食膈俱貼胃口肚臍常服甘草水如要速效作丸服之不服甘草水哮喘咳嗽貼前後心丹田飲甘草水如痰甚氣塞不通作條塞鼻中或作丸吞服不服甘草水大便閉小便閉俱貼肚臍服甘草水自通如數日不通危在旦夕作丸送下少腹用蔥搗敷立下不服甘草水傷寒時疫貼肚臍前後心飲甘草水一俟汗出而愈五六日不大便者作丸吞下便解而愈瘧疾一日二日三日俱貼肚臍服甘草水如發過四五次者作丸早晨服下飲熱酒數杯即日便止不可服甘草水如背發熱發寒貼前後心婦人赤白帶下貼臍下丹田服甘草水各種痢疾貼胃口肚臍四五日不愈紅用龍眼殼核七個打碎煎湯將膏藥作丸送下白用荔枝殼核七個打碎煎湯將膏藥作丸送下紅白兼者龍眼荔枝殼核同用婦人難產逆生胞衣不下作丸熱酒送下立刻便生產門小腹煎甘草湯頻洗不可服小兒驚風翻目上氣痰喘氣塞不通作條塞鼻貼一膏於臍上服甘草水如急極作丸服之不服甘草水小兒諸疳貼肚臍上口疳貼牙床不服甘草水婦人經閉不通貼丹田臍下如病久作丸服之小腹上用甘草末調蔥汁敷之不服甘草水血塊痞積貼臍處並貼痞上飲甘草水人健壯者作丸日服便泄下矣疔瘡內服外貼飲甘草水發背各癰疽毒不必剪頭貼患處服甘草銀花水未成者消已成者潰潰者拔膿生肌神效臁瘡腳氣攤上反貼上蓋以紙用帶縛定一日洗換十日愈矣大腸風下血夢遺白濁俱貼臍下服甘草水小腸疝氣有一股掣引小腹上痛者貼痛處再用葫蘆巴大小茴末沖酒服痔漏內則卷條插入外則貼之再用象牙末調雞蛋清開水沖服日三錢半月全愈跌打損傷貼患上服甘草水如重者用透骨草搗甜酒糟內服外敷丸子癢如已潰爛貼之拔膿生肌倘未破者不可貼恐出頭也孕婦勿貼膏藥方大黃一兩香附七錢三稜一兩羌活八錢厚朴七錢芫花七錢蜈蚣十條酥桃仁七錢研生地一兩白芷八錢檳榔七錢黃柏八錢大戟八錢蛇蛻五錢巴豆八錢研牙皂八錢杏仁七錢研細辛七錢麻黃八錢黃連五錢甘遂二兩川烏一兩莪朮一兩枳實八錢獨活七錢防風七錢全蠍七錢去鉤草烏七錢元參七錢甲珠七錢萆麻子二兩研花粉七錢五倍子七錢當歸一兩五錢木鱉子二兩道地藥材照方稱配用真香油六斤浸磁盆內五日炭火微熬候藥色枯黑濾滓加入淨黃丹三十六兩陀僧末四兩攪勻不住手至滴水成珠即停火微溫加入好肉桂末八錢即成膏矣宣化丸即景岳百順丸也治一切陽邪積滯凡氣積血積蟲積食積傷寒實熱閉結並痢疾腹脹初起疼痛裡急後重飲食不下等症錦紋大黃切片以好酒伴勻安飯鍋上蒸過再曬照式以九次為度牙皂炒微黃凡用大黃一斤皂一兩六錢上依法制共磨為末以蒸餅打糊為丸或開水搗丸或煉蜜為丸俱可每服或用三分或五分或一錢或二三錢量人虛實隨宜斟酌加減或投煎劑同煎或用滾湯吞送或隨症用引經湯送解毒六郁丸凡婦人有兒食乳吹氣其奶脹硬作痛或發寒熱速以真廣皮一兩煎湯調服一丸頃刻消散治氣鬱血鬱痰鬱火鬱食鬱濕鬱六者之中以氣為主氣行則鬱散矣兼治男婦觸受時行濕熱之氣壅於四肢脈絡發為癰腫焮熱疼痛潰腐及臁瘡赤痛等症香附醋炒蒼朮米泔水浸炒撫芎神麯梔子炒黑陳廣皮花粉黃芩上各等分磨末煉蜜為丸每丸重三錢如遇各證每日早晚用白滾湯各調送一丸忌食豬肝發物白薇煎治箭風痛俗名鬼箭打或頭項肩背手足腰䏚筋骨疼痛遍身不遂等嘗見鄉人用針挑起疙瘩或微出血其痛暫緩過日復發愈挑而痛發愈勤此方一服即愈永不再發東白薇二錢澤蘭葉三錢穿山甲片一錢炒黃研上以好酒煎服嘗揣此症不過辛苦勞力之人氣血不足適受外感風邪壅鬱脈絡不通自易作痛即使挑出微血略通一處所謂通則不痛也余處未通隨後復發余制此方端行血絡通瘀透邪奏效快捷凡遇此症毋忽視焉子龍丸一名妙應丸即陳無擇三因方中之控涎丹也治人忽患胸背手足腰項牽引疼痛走易不定或手足冷痹氣脈不通此乃痰涎在胸膈上下誤認癱瘓非也並治喉中結氣狀似梅核倏有倏無沖咽悶絕乃遍身或起筋塊如榴如慄皮色不變不疼不痛但覺痠麻或自潰串爛流水如涎經年不愈有若漏瘡此乃痰結經絡所致常服此丸自能全愈甘遂浸去綠水一日一換七日為度曬乾去心研細聽用大戟去皮曬磨忌用火炒白芥子炒上藥各等分為末以神麯糊丸梧桐子大或蜜丸亦可臨臥時以淡薑湯送下五七丸至十丸痰過者加數丸腳氣加檳榔木瓜松枝卷柏驚痰加硃砂全蠍驚氣成塊加甲片鱉甲延胡蓬朮熱痰加芒硝寒痰加胡椒丁香乾薑肉桂李時珍曰痰涎為物隨升隨降無處不到入心則迷成癲癇入肺則塞竅為喘咳背冷入肝則膈痛乾嘔寒熱往來入經絡則麻痹疼痛入筋骨則牽掣釣痛入皮肉則瘰癧癰腫陳無擇三因方並以控涎丹主之殊有奇功此乃治痰之本痰之本水也濕也得氣與火則結為痰大戟能泄臟腑水濕甘遂能行經隧水濕直達水氣所結之處以攻決為用白芥子能散皮裡膜外痰氣惟善用者能收奇也五香丸專能消食消水消積消痰消痞消滯消腫消疼消血消痢消蟲消隔消脹消悶一切有餘之症服此即可消化並治痰迷心竅每付七八分或一錢薑湯送下臨睡一付次早一服藥料尋常功效甚大奉勸樂善之人修合施送所費無多其福德則甚大也五靈脂一斤香附米一斤黑醜三兩白醜二兩共為細末一半微火炒熟一半生用再和勻好醋為丸如蘿蔔子大醒迷至寶丹治痰迷心竅癡呆顛狂不論新久甚效膽南星生棗仁遠志肉茯神柴胡各三錢川貝母半夏曲各二錢廣陳皮縮砂甘草廣木香各一錢共為細末蜜丸梧桐子硃砂三錢共為衣每清晨開水送下三四十丸甚效又方治豬羊癲瘋時常跌倒不省人事竟成廢人連服數付即可除根皂礬一兩煅紅魚膠一兩切斷麵炒鉛粉一兩炒黃硃砂三錢共研極細末每早空心用陳酒調服三錢又抱膽丸治諸般瘋狂癲癇痰迷心竅等症神效川鬱金一兩天竺黃一兩雄黃五錢白礬三錢上為細末用不落水豬心血搗勻為丸如桂圓肉大每日以石菖蒲五分煎湯調送一丸藥用硃砂為衣遇仙丹即走方鼎竄之一治邪熱上攻痰涎壅盛反胃吐食十隔五噎齁喘酒積蟲蠱積血積氣塊諸般痞疾疼墊痛腫或大小便不利或婦人女子面色萎黃兒胎癥瘕食吞銅鐵銀物之類悉皆治之五更時用冷茶送下三錢天明看所下之物此藥有病去病有蟲去蟲不傷元氣不損臟腑功效不能盡述小兒減半孕婦忌服白醜炒令半生取頭末四兩白檳榔一兩炒鈴兒茵陳五錢炒牙皂角五錢去皮核炙用蓬莪朮五錢醋炙京三稜五錢醋炙上依法制末和勻以醋和糊丸如綠豆大依前法服之大便行過之後隨以溫粥啖之忌食他物礞石滾痰丸治實熱老痰怪症百病汪訒庵曰風木太過剋制脾土氣不運化積滯生痰壅塞上中二焦回薄腸胃曲折之處謂之老痰變生百病不可測識非尋常藥餌所能療也此丸主之青礞石一兩沉香五錢研末川軍八兩酒蒸一次研末黃芩八兩炒研末上將青礞石打碎用焰硝一兩同入瓦罐鹽泥封固曬乾火煅兩日石色如金為度研細和諸藥末水搗為丸如綠豆大每服三分薑湯送下量人虛實加減分數服後仰臥令藥在胸膈之間除逐上焦痰滯不宜飲水行動但礞石煅過無金星者不堪用且須預先煅好愈陳愈佳新煅恐硝毒未淨止嗽散治諸般咳嗽即傷風不醒脈非細數未成弱症悉皆治之桔梗炒荊芥炒紫苑飯上蒸一次再炒百部飯上蒸一次再炒白前飯上蒸一次再炒以上各用八兩甘草三兩炒陳皮四兩水洗去白炒上共為細末每服三錢臨睡時開水調下初感風寒生薑湯調下青礬散治濕熱黃疸目睛指甲遍體盡成黃色身體懶倦胸腹飽悶食下即脹等症服此一料即能退黃肚飢思食至重者服兩料除根真青黛篩去石灰用一分潔白明礬五分六釐共研極細分作七付每早空心用雞蛋一個去黃瀝青調服一付藥完病愈又治黃病神方皂礬八兩面一斤上二味合作餅入火煨焦為度蒼朮六兩米泔浸厚朴六兩去皮薑汁炒陳皮六兩甘草六兩川椒十兩去閉口者及目共為末用棗肉三斤核桃肉三斤同搗成膏和丸桐子大每服三錢初服覺香至愈時則聞藥臭矣追風散治大人小兒或縱食瓜果生冷之物以致胃寒生蟲肚痛面黃肌瘦唇生白點可驗發作時叫號疼楚食下即吐或嘔涎沫甚則暈厥凡食甜物其病立發黑醜取頭末一兩五錢白醜取頭末一兩檳榔一兩五錢鶴蝨一兩雷丸一兩史君子去皮切片三十個共為細末篩細重羅每服五錢五更以沙糖和水調服至日中時其蟲必從大便而出隔五日再照法服一次其根永斷凡服此藥要在上半個月蟲頭向上方效黃金丹治霍亂吐瀉或絞腸疼痛一切暑痧症候黃連二兩四錢酒芩二兩一錢澤瀉三錢香附三錢廣皮三錢乾薑二兩一錢公丁香二錢川貝六錢砂仁三錢檳榔六錢木香六錢芥穗三錢前胡六錢麥芽三錢蓽茇三錢車前子六錢為末醋合丸一錢重每一丸或兩丸至重者三丸用新汲涼水調下治瘧疾初起兩三次方廣皮一錢半夏一錢薑汁煮茯苓一錢威靈仙一錢厚朴八分乳拌炒蒼朮八分米泔浸炒柴胡八分黃芩八分廣青皮六分檳榔六分炙草三分如兼頭痛加白芷一錢姜三片井水河水兌煎飢時服若三四次後猶未愈者服第二方何首烏二錢生用廣皮八分茯苓八分白朮一錢土炒當歸一錢威靈仙一錢知母二錢柴胡八分黃芩八分炙草三分鱉甲二錢醋炙脆研粉姜三片井水河水兌煎將好時加入黃酒一杯再煎一滾空心服此方妙在補瀉互用虛實得宜不用人參黃耆屏去常山草果平平無奇卻有神效即極弱之人極重之病十劑之後立有起色但不可加減一二久瘧全消方威靈仙一兩蓬莪朮一兩醋炒炒麥芽一兩生首烏一兩曬燥金毛脊八錢青蒿子五錢飛黃丹五錢川甲片五錢水煮透炒炙鱉甲五錢如小兒服加雞肫皮五錢炙共為細末用山藥粉一兩飴糖一兩兌滾水一小碗搗勻丸如綠豆大每服三錢小兒二錢或一錢俟半飢時用薑湯送下半料即全愈矣治痢疾神效方黃連一斤生槐米二斤枳殼斤半炒黃芩二斤白芍三斤檳榔一斤廣木香一斤甘草一斤川柏二斤酒炒厚朴一斤去粗皮桃仁斤半去皮尖歸尾半斤酒炒川軍一斤酒炒神麯一斤炒共為末陳米糊為丸桐子大每服三錢或四五錢早晚服兩次白開水送下若欲服湯劑即將斤改為錢又治紅白痢疾效方杜仲炒檳榔厚朴紅曲上藥四味如用各一錢紅棗即用一兩如各二錢紅棗即二兩共用水煎服龍虎丸此方未曾試過傳方人說其效非常治一切吐血症可保全愈龍骨煅虎骨煅川芎當歸洗桂圓肉煮爛搗膏熟地煮爛搗膏砂仁木香山楂破故紙鹽炒防風廣皮酸棗仁炒杜仲炒炭菟絲子黃芩貫眾炒炭白蒺藜各四兩炒川膝浸煅石膏神麯炒川貝去心木通甘草各二錢上為細末用方內桂圓膏熟地膏合煉蜜為丸三錢重每日早晚各服一丸用藕湯送下秘製兔血丸治吐血及男婦一切咳血弩血便血溺血崩漏帶下產後惡露不行或行血不止或老婦倒開花症並皆治之連服三付即愈但此藥不可見日月燈火三光及婦人手病好後忌房欲腥辣生冷百日藿香二兩乳香兩半沉香兩半木香一兩母丁香四兩麝香四錢共為細末必於臘八日用活兔血以手就蕎麥麵再沾老酒為丸重五分用無灰老酒送下或一丸或二三丸斟酌用之治吐血成鬥命在須臾回生方貫眾為末五錢黑頭髮五錢瓦上煅研末用側柏葉要用多多以涼水浸透搗爛取汁一碗入末於汁內隔湯煮一炷香時取出加童便一茶鍾黃酒一小鐘徐徐飲之神效又方治同前干藕節炒黑蒲黃黑頭髮瓦上煅各三錢共為極細末用白開水調服立止治咳嗽吐血方木耳炒黑槐米炒黑荊芥炒黑炒黑蒲黃各一兩共為末每早用米湯調服三錢甚效黃疸吐血病後身面俱黃吐血盛盆諸藥不效者服此方用田螺十個水漂去泥搗爛露一夜五更取清汁服二三次即血止黃退而愈治便血奇方黑荊芥一錢五分苦參一錢五分歸身二錢黃連一錢蓮蓬殼一個水煎服四五付即愈妊娠吐血馬屁勃五分研末濃米湯調服即止治氣臌氣脹方以蘿蔔子二兩研末再以生蘿蔔搗爛和子共絞取汁將廣縮砂二兩浸於汁內一宿撈起曬乾再浸再曬七次為度研為極細末每服一錢米飲調下立效又方治同前以薑汁炒遠志肉五錢水煎服下氣通即愈治噎隔方糖坊內榨過頭造之糟一斤加生薑四兩共搗爛做作薄餅曬乾磨末磁罐盛貯每早以開水調服二錢其味最美兼可泡湯供客代茶又治隔氣方硃砂牛黃木香蜣螂川貝沉香元明粉青黛各二分共研勻每服三分以萬年青根汁三白酒各半杯服一次開關三次全愈治噎隔神效方豬肺管四兩舊羅底羅面用日久者一個鮮藕四兩無鮮時干藕節亦可用以上三味用砂鍋燒灰研細用薑汁白霜糖各一兩初服吐者再三服之神效服後忌各色豆十餘日許學士痛風方治歷節諸風走痛立效川烏揀大者去皮用兩個烘燥研末黑豆二十一粒炒全蠍二十一枚水洗地龍五錢焙乾去泥麝香二分五釐共為細末粉糊九綠豆大每服十丸溫酒送下筋骨疼痛似或絆緊神效方紫背浮萍菖蒲根三錢當歸二錢黃酒煎服出汗即愈神效九分散治跌打損傷無論青腫錯折破爛皆效馬前子四兩去毛皮麻黃四兩去節乳香四兩去油沒藥四兩去油上四味各研細再合研極細收磁瓶內勿令泄氣遇有受傷人即與准九分服下以無灰老酒調藥力甚大服者萬不可過九分外傷處破者幹上若未破止見青腫用燒酒調塗服藥後如覺胸中發鬧周身發麻此是藥力行動勿恐若受傷甚重服後不見動靜過一個半時辰再用無酒灰調服九分再服後仍無動靜再過個半時辰再服九分如此敷服無論何樣重傷皆能起死回生真破傷第一方也孕婦忌服玉真散治破傷風咬牙縮舌腰背反張勢在垂危起死回生方天南星薑汁炒防風白芷殭蠶炒斷絲各等分研極細末每服三錢童便和好酒調下凡跌打損傷內有瘀血者亦效又方治同前天南星薑汁炒防風天麻羌活白芷以上各一兩白附子十二兩共為細末收磁瓶內勿令泄氣專治刀斧跌打等傷將藥用涼開水調勻敷在患處即愈受傷過重者先用藥敷好再用無灰老酒或白開水沖服三錢即愈亦能除風又方治同前此三方真仙方也荊芥五錢黃蠟五錢魚鰾五錢炒黃艾葉三錢共入磁瓶內泡黃酒一碗封固口隔水煮一炷香時取出乘熱服下蓋暖汗出即愈百日內不可食雞肉雞子如抽風至奄奄一息進將口挑開用此藥細細灌下亦可救活受傷人傷處浮腫及口眼歪邪者惟此方可救展子明傳接骨方旱公牛角一個在炭火上炙乾一層刮一層榆樹皮白里不拘多少曬乾楊樹葉不拘多少黃米麵不拘多少莜麵亦可花椒七粒共為細末以數年陳醋熬成稀糊青布攤貼外再用薄木片纏住時刻聞骨內響聲不絕俟聲定即接好矣如牛馬跌傷及樹木被風颳折亦能接上治跌僕筋攣三四年不愈者立效如神楊梅樹皮曬燥研末以滴花燒酒隔燉熟調塗患處以絹紮好每日一換不過三五次即愈婦科隨錄三合保胎丸此方是保孕安胎之聖藥也名三合進是古之內補丸杜仲丸白朮散三方合集成一方也大懷生地十二兩用砂仁三兩老薑三兩同地黃入砂鍋內先用清水煮兩晝夜俟地黃將爛再入黃酒煮至極爛時去砂仁姜不用將地黃搗成膏大當歸八兩去頭尾取身切片酒洗曬乾思仙術十二兩以細淨黃砂土拌炒實條黃芩枯飄者不用揀妥六兩酒拌炒三次棉杜仲十二兩切片鹽水拌炒斷絲用川續斷十二兩切片酒炒上將後五味炒乾為細末以前地黃膏和勻再搗少加煉蜜為丸梧桐子大每早用淡鹽湯吞三錢臨睡用老酒送三錢每日如此不可間斷服過七個月方保無虞此方甚效不可加減如不能飲酒都用鹽湯送下亦可泰山磐石散保孕安胎與前方同但偏於陰虛者宜服前方若兼陽虛者服此方為當人參一錢如無以黨參三錢代之黃耆一錢蜜炙川斷一錢黃芩一錢川芎五分白芍八分酒炒熟地八分白朮二錢土炒甘草五分蜜炙廣砂仁五分研糯米二錢以上用泉水煎服但覺有孕隔三五日常服一付過四周月方保無虞其藥渣可傾河池令魚食米更好以上二方真能補天地化工之妙但養法亦必須講究何也婦人懷孕在百天之內胎如花果初發